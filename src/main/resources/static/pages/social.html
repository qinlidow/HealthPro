<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthPro - 社交广场</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .page-content { padding-top: 60px; padding-bottom: 80px; min-height: 100vh; background: var(--bg-secondary); }
        .page-header { background: linear-gradient(135deg, #E91E63, #C2185B); padding: 30px 24px; color: white; }
        .page-header-content { max-width: 1200px; margin: 0 auto; }
        .page-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .main-content { max-width: 800px; margin: -20px auto 0; padding: 0 24px; }
        
        .category-tabs { display: flex; gap: 12px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px; }
        .category-tab { padding: 10px 20px; border: none; background: white; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 500; white-space: nowrap; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .category-tab:hover { background: #FCE4EC; }
        .category-tab.active { background: #E91E63; color: white; }
        
        .post-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 16px; }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .post-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #E91E63, #C2185B); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 18px; flex-shrink: 0; }
        .post-author { flex: 1; }
        .post-author-name { font-weight: 600; font-size: 16px; }
        .post-author-time { font-size: 12px; color: #9E9E9E; }
        .post-category { padding: 4px 12px; border-radius: 20px; font-size: 12px; background: #F5F5F5; color: #757575; }
        
        .post-content { font-size: 15px; line-height: 1.6; color: #424242; margin-bottom: 16px; }
        .post-images { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
        .post-image { width: 100%; aspect-ratio: 1; background: #F5F5F5; border-radius: 8px; }
        
        .post-actions { display: flex; gap: 24px; padding-top: 16px; border-top: 1px solid #F0F0F0; }
        .post-action { display: flex; align-items: center; gap: 8px; color: #757575; cursor: pointer; transition: all 0.3s ease; background: none; border: none; font-size: 14px; }
        .post-action:hover { color: #E91E63; }
        .post-action.liked { color: #E91E63; }
        
        .post-stats { display: flex; gap: 16px; margin-top: 12px; font-size: 13px; color: #9E9E9E; }
        
        .fab { position: fixed; bottom: 90px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #E91E63, #C2185B); color: white; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 12px rgba(233, 30, 99, 0.4); z-index: 100; }
        .fab:hover { transform: scale(1.1); }
        
        .hot-topics { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 24px; }
        .hot-topics-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .hot-topic { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #F0F0F0; cursor: pointer; }
        .hot-topic:last-child { border-bottom: none; }
        .hot-topic-rank { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; background: #F5F5F5; color: #757575; }
        .hot-topic-rank.top { background: #FF5722; color: white; }
        .hot-topic-text { flex: 1; font-size: 14px; }
        .hot-topic-heat { font-size: 12px; color: #9E9E9E; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand"><div class="navbar-brand-icon">💚</div><span>HealthPro</span></a>
        <div class="navbar-menu">
            <a href="index.html" class="navbar-item">首页</a>
            <a href="body.html" class="navbar-item">身体数据</a>
            <a href="diet.html" class="navbar-item">饮食记录</a>
            <a href="sleep.html" class="navbar-item">睡眠管理</a>
            <a href="fitness.html" class="navbar-item">健身管理</a>
            <a href="social.html" class="navbar-item active">社交广场</a>
        </div>
        <div class="navbar-user" onclick="location.href='user.html'"><div class="avatar">U</div><span class="navbar-user-name hide-mobile">用户</span></div>
    </nav>
    
    <div class="page-content">
        <div class="page-header">
            <div class="page-header-content">
                <h1 class="page-title">👥 社交广场</h1>
                <p>分享健康经验，交流养生心得</p>
            </div>
        </div>
        
        <div class="main-content">
            <!-- 热门话题 -->
            <div class="hot-topics">
                <h3 class="hot-topics-title">🔥 热门话题</h3>
                <div class="hot-topic">
                    <div class="hot-topic-rank top">1</div>
                    <div class="hot-topic-text">科学减脂方法分享</div>
                    <div class="hot-topic-heat">2.3万讨论</div>
                </div>
                <div class="hot-topic">
                    <div class="hot-topic-rank top">2</div>
                    <div class="hot-topic-text">改善睡眠质量的小技巧</div>
                    <div class="hot-topic-heat">1.8万讨论</div>
                </div>
                <div class="hot-topic">
                    <div class="hot-topic-rank top">3</div>
                    <div class="hot-topic-text">健康早餐食谱推荐</div>
                    <div class="hot-topic-heat">1.5万讨论</div>
                </div>
                <div class="hot-topic">
                    <div class="hot-topic-rank">4</div>
                    <div class="hot-topic-text">居家健身计划</div>
                    <div class="hot-topic-heat">1.2万讨论</div>
                </div>
                <div class="hot-topic">
                    <div class="hot-topic-rank">5</div>
                    <div class="hot-topic-text">血压管理经验</div>
                    <div class="hot-topic-heat">9千讨论</div>
                </div>
            </div>
            
            <!-- 分类标签 -->
            <div class="category-tabs">
                <button class="category-tab active" data-category="all">全部</button>
                <button class="category-tab" data-category="body">💪 身体数据</button>
                <button class="category-tab" data-category="diet">🍽️ 饮食记录</button>
                <button class="category-tab" data-category="sleep">😴 睡眠管理</button>
                <button class="category-tab" data-category="fitness">🏃 健身管理</button>
            </div>
            
            <!-- 帖子列表 -->
            <div id="postsList"></div>
        </div>
    </div>
    
    <button class="fab" onclick="showPostModal()">+</button>
    
    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item"><span class="bottom-nav-icon">🏠</span><span class="bottom-nav-text">首页</span></a>
        <a href="body.html" class="bottom-nav-item"><span class="bottom-nav-icon">💪</span><span class="bottom-nav-text">身体</span></a>
        <a href="fitness.html" class="bottom-nav-item"><span class="bottom-nav-icon">🏃</span><span class="bottom-nav-text">健身</span></a>
        <a href="social.html" class="bottom-nav-item active"><span class="bottom-nav-icon">👥</span><span class="bottom-nav-text">广场</span></a>
        <a href="user.html" class="bottom-nav-item"><span class="bottom-nav-icon">👤</span><span class="bottom-nav-text">我的</span></a>
    </nav>
    
    <!-- 发帖模态框 -->
    <div class="modal-overlay" id="postModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">发布动态</h3>
                <button class="modal-close" onclick="closeModal('postModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">分类</label>
                    <select class="form-select" id="postCategory">
                        <option value="body">💪 身体数据</option>
                        <option value="diet">🍽️ 饮食记录</option>
                        <option value="sleep">😴 睡眠管理</option>
                        <option value="fitness">🏃 健身管理</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">内容</label>
                    <textarea class="form-input" id="postContent" rows="5" placeholder="分享你的健康经验..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('postModal')">取消</button>
                <button class="btn btn-primary" onclick="publishPost()">发布</button>
            </div>
        </div>
    </div>
    
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        if (!http.isAuthenticated()) window.location.href = '../login.html';
        
        let postsData = [];
        let currentCategory = 'all';
        
        const categoryNames = {
            body: '💪 身体数据',
            diet: '🍽️ 饮食记录',
            sleep: '😴 睡眠管理',
            fitness: '🏃 健身管理'
        };
        
        async function loadPosts() {
            const result = await api.getPosts(currentCategory);
            if (result.success && result.data) {
                postsData = result.data;
                renderPosts();
            } else {
                document.getElementById('postsList').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><p>暂无动态，快来发布第一条吧</p></div>';
            }
        }
        
        function renderPosts() {
            const container = document.getElementById('postsList');
            
            if (!postsData || postsData.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><p>暂无动态，快来发布第一条吧</p></div>';
                return;
            }
            
            container.innerHTML = postsData.map(post => `
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-avatar">${(post.user_name || 'U')[0].toUpperCase()}</div>
                        <div class="post-author">
                            <div class="post-author-name">${post.user_name || '匿名用户'}</div>
                            <div class="post-author-time">${post.date || ''}</div>
                        </div>
                        <div class="post-category">${categoryNames[post.category] || '其他'}</div>
                    </div>
                    <div class="post-content">${post.content}</div>
                    <div class="post-actions">
                        <button class="post-action" onclick="likePost(${post.id})">
                            <span>❤️</span>
                            <span>${post.likes}</span>
                        </button>
                        <button class="post-action" onclick="commentPost(${post.id})">
                            <span>💬</span>
                            <span>${post.comments}</span>
                        </button>
                        <button class="post-action" onclick="sharePost(${post.id})">
                            <span>🔗</span>
                            <span>分享</span>
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        // 分类切换
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentCategory = tab.dataset.category;
                loadPosts();
            });
        });
        
        function showPostModal() { document.getElementById('postModal').classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        
        async function publishPost() {
            const category = document.getElementById('postCategory').value;
            const content = document.getElementById('postContent').value;
            
            if (!content.trim()) {
                utils.showToast('请输入内容', 'error');
                return;
            }
            
            const today = new Date();
            const dateStr = today.getFullYear() + '-' + 
                String(today.getMonth() + 1).padStart(2, '0') + '-' + 
                String(today.getDate()).padStart(2, '0');
            
            const result = await api.addPost({
                category: category,
                content: content,
                date: dateStr
            });
            
            if (result.success) {
                utils.showToast('发布成功', 'success');
                closeModal('postModal');
                document.getElementById('postContent').value = '';
                loadPosts();
            } else {
                utils.showToast(result.message || '发布失败', 'error');
            }
        }
        
        async function likePost(id) {
            const result = await api.likePost(id);
            if (result.success) {
                utils.showToast('点赞成功', 'success');
                loadPosts();
            } else {
                utils.showToast(result.message || '点赞失败', 'error');
            }
        }
        
        async function commentPost(id) {
            const result = await api.commentPost(id);
            if (result.success) {
                utils.showToast('评论成功', 'success');
                loadPosts();
            } else {
                utils.showToast(result.message || '评论失败', 'error');
            }
        }
        
        function sharePost(id) {
            utils.showToast('已复制分享链接', 'success');
        }
        
        loadPosts();
    </script>
</body>
</html>
