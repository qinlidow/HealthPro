<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthPro - 个人健康管理平台</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .login-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4CAF50, #8BC34A);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            color: white;
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.3);
        }
        
        .login-title {
            font-size: 28px;
            font-weight: 600;
            color: #212121;
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            color: #757575;
            font-size: 14px;
        }
        
        .login-tabs {
            display: flex;
            margin-bottom: 30px;
            background: #F5F5F5;
            border-radius: 10px;
            padding: 4px;
        }
        
        .login-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #757575;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .login-tab.active {
            background: white;
            color: #4CAF50;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .login-form {
            display: none;
        }
        
        .login-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        .form-input-icon {
            position: relative;
            margin-bottom: 20px;
        }
        
        .form-input-icon input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .form-input-icon input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.1);
        }
        
        .form-input-icon .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #757575;
        }
        
        .form-input-icon .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #757575;
            font-size: 18px;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4CAF50, #8BC34A);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.3);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #E0E0E0;
        }
        
        .login-footer-text {
            color: #757575;
            font-size: 14px;
        }
        
        .login-footer-link {
            color: #4CAF50;
            text-decoration: none;
            font-weight: 500;
        }
        
        .form-error {
            color: #F44336;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }
        
        .form-error.show {
            display: block;
        }
        
        .demo-account {
            background: #FFF8E1;
            border-radius: 10px;
            padding: 12px 16px;
            margin-top: 20px;
            font-size: 13px;
            color: #F57C00;
        }
        
        .demo-account strong {
            color: #E65100;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .shake {
            animation: shake 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">💚</div>
                <h1 class="login-title">HealthPro</h1>
                <p class="login-subtitle">个人健康管理平台</p>
            </div>
            
            <div class="login-tabs">
                <button class="login-tab active" data-tab="login">登录</button>
                <button class="login-tab" data-tab="register">注册</button>
            </div>
            
            <!-- 登录表单 -->
            <form id="loginForm" class="login-form active">
                <div class="form-input-icon">
                    <span class="icon">📱</span>
                    <input type="tel" id="loginPhone" placeholder="请输入手机号" required>
                </div>
                <p class="form-error" id="loginPhoneError">请输入正确的手机号</p>
                
                <div class="form-input-icon">
                    <span class="icon">🔒</span>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required>
                    <span class="toggle-password" onclick="togglePassword('loginPassword')">👁</span>
                </div>
                <p class="form-error" id="loginPasswordError">密码不能为空</p>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    <span>登 录</span>
                </button>
                
                <div class="demo-account">
                    <strong>提示：</strong>请先注册账号，或使用已注册的账号登录
                </div>
            </form>
            
            <!-- 注册表单 -->
            <form id="registerForm" class="login-form">
                <div class="form-input-icon">
                    <span class="icon">👤</span>
                    <input type="text" id="registerName" placeholder="请输入用户名" required>
                </div>
                <p class="form-error" id="registerNameError">用户名不能为空</p>
                
                <div class="form-input-icon">
                    <span class="icon">📱</span>
                    <input type="tel" id="registerPhone" placeholder="请输入手机号" required>
                </div>
                <p class="form-error" id="registerPhoneError">请输入正确的手机号</p>
                
                <div class="form-input-icon">
                    <span class="icon">🔒</span>
                    <input type="password" id="registerPassword" placeholder="请输入密码（至少6位）" required>
                    <span class="toggle-password" onclick="togglePassword('registerPassword')">👁</span>
                </div>
                <p class="form-error" id="registerPasswordError">密码至少6位</p>
                
                <div class="form-input-icon">
                    <span class="icon">📧</span>
                    <input type="email" id="registerEmail" placeholder="请输入邮箱（选填）">
                </div>
                
                <button type="submit" class="login-btn" id="registerBtn">
                    <span>注 册</span>
                </button>
            </form>
            
            <div class="login-footer">
                <p class="login-footer-text">
                    登录即表示同意 <a href="#" class="login-footer-link">用户协议</a> 和 <a href="#" class="login-footer-link">隐私政策</a>
                </p>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
        // 切换登录/注册表单
        document.querySelectorAll('.login-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const targetTab = tab.dataset.tab;
                
                // 更新标签状态
                document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                // 更新表单显示
                document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
                document.getElementById(targetTab + 'Form').classList.add('active');
            });
        });
        
        // 切换密码显示
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }
        
        // 验证手机号
        function validatePhone(phone) {
            return /^1[3-9]\d{9}$/.test(phone);
        }
        
        // 显示错误
        function showError(elementId, message) {
            const errorEl = document.getElementById(elementId);
            errorEl.textContent = message;
            errorEl.classList.add('show');
            errorEl.previousElementSibling.querySelector('input').classList.add('shake');
            setTimeout(() => {
                errorEl.previousElementSibling.querySelector('input').classList.remove('shake');
            }, 300);
        }
        
        // 隐藏错误
        function hideError(elementId) {
            document.getElementById(elementId).classList.remove('show');
        }
        
        // 登录处理
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const phone = document.getElementById('loginPhone').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            // 验证
            let hasError = false;
            
            if (!validatePhone(phone)) {
                showError('loginPhoneError', '请输入正确的手机号');
                hasError = true;
            } else {
                hideError('loginPhoneError');
            }
            
            if (!password) {
                showError('loginPasswordError', '密码不能为空');
                hasError = true;
            } else {
                hideError('loginPasswordError');
            }
            
            if (hasError) return;
            
            // 显示加载状态
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>';
            
            try {
                const result = await api.login({ phone, password });
                
                if (result.success) {
                    utils.showToast('登录成功！', 'success');
                    // 保存用户信息
                    utils.storage.set('userInfo', { phone });
                    // 跳转到主页
                    setTimeout(() => {
                        window.location.href = 'pages/index.html';
                    }, 1000);
                } else {
                    utils.showToast(result.message || '登录失败', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<span>登 录</span>';
                }
            } catch (error) {
                utils.showToast('网络错误，请检查后端服务', 'error');
                btn.disabled = false;
                btn.innerHTML = '<span>登 录</span>';
            }
        });
        
        // 注册处理
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('registerName').value.trim();
            const phone = document.getElementById('registerPhone').value.trim();
            const password = document.getElementById('registerPassword').value;
            const email = document.getElementById('registerEmail').value.trim();
            
            // 验证
            let hasError = false;
            
            if (!name) {
                showError('registerNameError', '用户名不能为空');
                hasError = true;
            } else {
                hideError('registerNameError');
            }
            
            if (!validatePhone(phone)) {
                showError('registerPhoneError', '请输入正确的手机号');
                hasError = true;
            } else {
                hideError('registerPhoneError');
            }
            
            if (password.length < 6) {
                showError('registerPasswordError', '密码至少6位');
                hasError = true;
            } else {
                hideError('registerPasswordError');
            }
            
            if (hasError) return;
            
            // 显示加载状态
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>';
            
            try {
                const result = await api.register({ name, phone, password, email });
                
                if (result.success) {
                    utils.showToast('注册成功！请登录', 'success');
                    // 切换到登录表单
                    setTimeout(() => {
                        document.querySelector('[data-tab="login"]').click();
                        document.getElementById('loginPhone').value = phone;
                    }, 1000);
                } else {
                    utils.showToast(result.message || '注册失败', 'error');
                }
            } catch (error) {
                utils.showToast('网络错误，请检查后端服务', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>注 册</span>';
            }
        });
        
        // 检查是否已登录
        if (http.isAuthenticated()) {
            window.location.href = 'pages/index.html';
        }
    </script>
</body>
</html>
