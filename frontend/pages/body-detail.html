<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthPro - 身体数据详情</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .page-content { padding-top: 60px; padding-bottom: 24px; min-height: 100vh; background: var(--bg-secondary); }
        .page-header { background: linear-gradient(135deg, #4CAF50, #8BC34A); padding: 30px 24px; color: white; }
        .page-header-content { max-width: 1200px; margin: 0 auto; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: white; text-decoration: none; margin-bottom: 16px; }
        .page-title { font-size: 24px; font-weight: 600; }
        .main-content { max-width: 1200px; margin: -20px auto 0; padding: 0 24px; }
        
        .detail-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 24px; }
        .detail-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .data-item { text-align: center; padding: 20px; background: #F5F5F5; border-radius: 12px; }
        .data-value { font-size: 36px; font-weight: 600; color: #4CAF50; }
        .data-label { font-size: 14px; color: #757575; margin-top: 8px; }
        .data-status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-top: 8px; }
        
        .chart-container { margin-top: 20px; }
        
        .suggestion-box { background: linear-gradient(135deg, #E8F5E9, #C8E6C9); border-radius: 12px; padding: 20px; margin-top: 20px; }
        .suggestion-title { font-weight: 600; margin-bottom: 12px; }
        .suggestion-text { color: #616161; line-height: 1.6; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand"><span>HealthPro</span></a>
        <div class="navbar-menu">
            <a href="index.html" class="navbar-item">首页</a>
            <a href="body.html" class="navbar-item active">身体数据</a>
            <a href="diet.html" class="navbar-item">饮食记录</a>
            <a href="sleep.html" class="navbar-item">睡眠管理</a>
            <a href="fitness.html" class="navbar-item">健身管理</a>
            <a href="social.html" class="navbar-item">社交广场</a>
        </div>
        <div class="navbar-user" onclick="location.href='user.html'"><div class="avatar" id="userAvatar">U</div><span class="navbar-user-name hide-mobile" id="userName">用户</span></div>
    </nav>
    
    <div class="page-content">
        <div class="page-header">
            <div class="page-header-content">
                <a href="body.html" class="back-btn">← 返回</a>
                <h1 class="page-title" id="pageTitle">身体数据详情</h1>
            </div>
        </div>
        
        <div class="main-content">
            <div class="detail-card">
                <h3 class="detail-title">📊 数据概览</h3>
                <div class="data-grid" id="dataGrid"></div>
            </div>
            
            <div class="detail-card">
                <h3 class="detail-title">📈 历史趋势</h3>
                <div class="chart-container">
                    <canvas id="detailChart" height="300"></canvas>
                </div>
            </div>
            
            <div class="detail-card">
                <h3 class="detail-title">💡 健康建议</h3>
                <div id="suggestions"></div>
            </div>
        </div>
    </div>
    
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        if (!http.isAuthenticated()) window.location.href = '../login.html';

        // 加载导航栏用户信息
        async function loadNavbarUser() {
            try {
                const result = await api.getUserInfo();
                if (result.success && result.data) {
                    const user = result.data;
                    document.getElementById('userName').textContent = user.name || '用户';
                    const avatarEl = document.getElementById('userAvatar');
                    if (user.avatar) {
                        avatarEl.innerHTML = `<img src="${API_BASE_URL}${user.avatar}" alt="头像" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
                    } else {
                        avatarEl.textContent = (user.name || 'U')[0].toUpperCase();
                    }
                }
            } catch (e) {}
        }
        loadNavbarUser();
        
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'weight';
        const id = urlParams.get('id');
        
        const typeConfig = {
            weight: { title: '体重详情', unit: 'kg', icon: '⚖️', color: '#4CAF50' },
            bmi: { title: 'BMI详情', unit: '', icon: '📊', color: '#2196F3' },
            pressure: { title: '血压详情', unit: 'mmHg', icon: '❤️', color: '#FF9800' },
            sugar: { title: '血糖详情', unit: 'mmol/L', icon: '🩸', color: '#9C27B0' }
        };
        
        document.getElementById('pageTitle').textContent = typeConfig[type].title;
        
        async function loadData() {
            const result = await api.getBodyData();
            if (result.success && result.data) {
                const data = result.data.sort((a, b) => new Date(a.date) - new Date(b.date));
                renderData(data);
                renderChart(data);
                renderSuggestions(data);
            }
        }
        
        function renderData(data) {
            if (data.length === 0) return;
            const latest = data[data.length - 1];
            const config = typeConfig[type];
            
            let html = '';
            
            if (type === 'weight') {
                const trend = data.length >= 2 ? (latest.weight - data[data.length - 2].weight).toFixed(1) : 0;
                html = `
                    <div class="data-item">
                        <div class="data-value">${latest.weight || '--'}</div>
                        <div class="data-label">当前体重 (${config.unit})</div>
                    </div>
                    <div class="data-item">
                        <div class="data-value" style="color: ${trend >= 0 ? '#F44336' : '#4CAF50'}">${trend >= 0 ? '+' : ''}${trend}</div>
                        <div class="data-label">较上次变化 (${config.unit})</div>
                    </div>
                    <div class="data-item">
                        <div class="data-value">${data[0].weight || '--'}</div>
                        <div class="data-label">初始体重 (${config.unit})</div>
                    </div>
                    <div class="data-item">
                        <div class="data-value">${(latest.weight - data[0].weight).toFixed(1)}</div>
                        <div class="data-label">总变化 (${config.unit})</div>
                    </div>
                `;
            } else if (type === 'bmi') {
                const bmi = latest.height && latest.weight ? utils.calculateBMI(latest.weight, latest.height) : '--';
                const status = bmi !== '--' ? utils.getBMIStatus(bmi) : null;
                html = `
                    <div class="data-item">
                        <div class="data-value">${bmi}</div>
                        <div class="data-label">当前BMI</div>
                        ${status ? `<div class="data-status" style="background: ${status.color}20; color: ${status.color};">${status.status}</div>` : ''}
                    </div>
                    <div class="data-item">
                        <div class="data-value">${latest.height || '--'}</div>
                        <div class="data-label">身高 (cm)</div>
                    </div>
                    <div class="data-item">
                        <div class="data-value">${latest.weight || '--'}</div>
                        <div class="data-label">体重 (kg)</div>
                    </div>
                `;
            } else if (type === 'pressure') {
                const status = latest.pressure_h && latest.pressure_l ? utils.getBloodPressureStatus(latest.pressure_h, latest.pressure_l) : null;
                html = `
                    <div class="data-item">
                        <div class="data-value">${latest.pressure_h || '--'}/${latest.pressure_l || '--'}</div>
                        <div class="data-label">当前血压 (${config.unit})</div>
                        ${status ? `<div class="data-status" style="background: ${status.color}20; color: ${status.color};">${status.status}</div>` : ''}
                    </div>
                    <div class="data-item">
                        <div class="data-value">${latest.pressure_h || '--'}</div>
                        <div class="data-label">收缩压 (${config.unit})</div>
                    </div>
                    <div class="data-item">
                        <div class="data-value">${latest.pressure_l || '--'}</div>
                        <div class="data-label">舒张压 (${config.unit})</div>
                    </div>
                `;
            } else if (type === 'sugar') {
                const status = latest.sugar ? utils.getBloodSugarStatus(latest.sugar) : null;
                html = `
                    <div class="data-item">
                        <div class="data-value">${latest.sugar || '--'}</div>
                        <div class="data-label">当前血糖 (${config.unit})</div>
                        ${status ? `<div class="data-status" style="background: ${status.color}20; color: ${status.color};">${status.status}</div>` : ''}
                    </div>
                `;
            }
            
            document.getElementById('dataGrid').innerHTML = html;
        }
        
        function renderChart(data) {
            const ctx = document.getElementById('detailChart').getContext('2d');
            const config = typeConfig[type];
            
            let chartData = [];
            let label = '';
            
            if (type === 'weight') {
                chartData = data.map(d => d.weight);
                label = '体重 (kg)';
            } else if (type === 'bmi') {
                chartData = data.map(d => d.height && d.weight ? utils.calculateBMI(d.weight, d.height) : null);
                label = 'BMI';
            } else if (type === 'pressure') {
                chartData = data.map(d => d.pressure_h);
                label = '收缩压 (mmHg)';
            } else if (type === 'sugar') {
                chartData = data.map(d => d.sugar);
                label = '血糖 (mmol/L)';
            }
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.date.substring(5)),
                    datasets: [{
                        label: label,
                        data: chartData,
                        borderColor: config.color,
                        backgroundColor: config.color + '20',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true }
            });
        }
        
        function renderSuggestions(data) {
            if (data.length === 0) return;
            const latest = data[data.length - 1];
            let suggestions = [];
            
            if (type === 'weight' && latest.weight) {
                const trend = data.length >= 2 ? latest.weight - data[data.length - 2].weight : 0;
                if (trend > 0) {
                    suggestions.push({ title: '体重增加', text: '建议适当控制饮食，增加运动量，保持健康的生活方式。' });
                } else if (trend < 0) {
                    suggestions.push({ title: '体重下降', text: '体重下降中，请确保营养均衡，避免过度节食。' });
                }
            } else if (type === 'bmi' && latest.height && latest.weight) {
                const bmi = utils.calculateBMI(latest.weight, latest.height);
                const status = utils.getBMIStatus(bmi);
                suggestions.push({ title: 'BMI建议', text: status.advice });
            } else if (type === 'pressure' && latest.pressure_h && latest.pressure_l) {
                const status = utils.getBloodPressureStatus(latest.pressure_h, latest.pressure_l);
                suggestions.push({ title: '血压建议', text: status.advice });
            } else if (type === 'sugar' && latest.sugar) {
                const status = utils.getBloodSugarStatus(latest.sugar);
                suggestions.push({ title: '血糖建议', text: status.advice });
            }
            
            document.getElementById('suggestions').innerHTML = suggestions.map(s => `
                <div class="suggestion-box">
                    <div class="suggestion-title">💡 ${s.title}</div>
                    <div class="suggestion-text">${s.text}</div>
                </div>
            `).join('');
        }
        
        loadData();
    </script>
</body>
</html>
