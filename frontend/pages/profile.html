<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthPro - 个人主页</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .page-content { padding-top: 60px; padding-bottom: 80px; min-height: 100vh; background: var(--bg-secondary); }

        .profile-header { background: linear-gradient(135deg, #E91E63, #C2185B); padding: 40px 24px 60px; color: white; text-align: center; }
        .profile-avatar { width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 16px; border: 4px solid rgba(255,255,255,0.5); overflow: hidden; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-size: 22px; font-weight: 600; margin-bottom: 8px; }

        .profile-stats { display: flex; justify-content: center; gap: 40px; margin-top: 16px; }
        .profile-stat { text-align: center; }
        .profile-stat-value { font-size: 20px; font-weight: 600; }
        .profile-stat-label { font-size: 12px; opacity: 0.8; }

        .main-content { max-width: 800px; margin: -30px auto 0; padding: 0 24px; position: relative; }

        .profile-actions { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px; display: flex; justify-content: center; gap: 12px; }

        .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 0; color: #757575; cursor: pointer; font-size: 15px; background: none; border: none; }
        .back-btn:hover { color: #E91E63; }

        .post-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 16px; cursor: pointer; transition: all 0.3s ease; }
        .post-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
        .post-top-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: #FF5722; color: white; font-weight: 600; margin-bottom: 8px; }
        .post-title { font-size: 16px; font-weight: 600; color: #212121; margin-bottom: 8px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .post-image-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
        .post-meta { display: flex; gap: 16px; font-size: 13px; color: #9E9E9E; }
        .post-date { font-size: 12px; color: #9E9E9E; margin-bottom: 8px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand"><span>HealthPro</span></a>
        <div class="navbar-menu">
            <a href="index.html" class="navbar-item">首页</a>
            <a href="body.html" class="navbar-item">身体数据</a>
            <a href="diet.html" class="navbar-item">饮食记录</a>
            <a href="sleep.html" class="navbar-item">睡眠管理</a>
            <a href="fitness.html" class="navbar-item">健身管理</a>
            <a href="social.html" class="navbar-item active">社交广场</a>
        </div>
        <div class="navbar-user" onclick="location.href='user.html'"><div class="avatar" id="userAvatar">U</div><span class="navbar-user-name hide-mobile" id="userName">用户</span></div>
    </nav>

    <div class="page-content">
        <div class="profile-header">
            <div class="profile-avatar" id="profileAvatar">U</div>
            <div class="profile-name" id="profileName">用户</div>
            <div class="profile-stats">
                <div class="profile-stat">
                    <div class="profile-stat-value" id="followerCount">0</div>
                    <div class="profile-stat-label">粉丝</div>
                </div>
                <div class="profile-stat">
                    <div class="profile-stat-value" id="followingCount">0</div>
                    <div class="profile-stat-label">关注</div>
                </div>
                <div class="profile-stat">
                    <div class="profile-stat-value" id="totalLikes">0</div>
                    <div class="profile-stat-label">获赞</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="profile-actions" id="profileActions"></div>

            <div id="postsList"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item"><span class="bottom-nav-icon">🏠</span><span class="bottom-nav-text">首页</span></a>
        <a href="body.html" class="bottom-nav-item"><span class="bottom-nav-icon">💪</span><span class="bottom-nav-text">身体</span></a>
        <a href="diet.html" class="bottom-nav-item"><span class="bottom-nav-icon">🍽️</span><span class="bottom-nav-text">饮食</span></a>
        <a href="sleep.html" class="bottom-nav-item"><span class="bottom-nav-icon">😴</span><span class="bottom-nav-text">睡眠</span></a>
        <a href="fitness.html" class="bottom-nav-item"><span class="bottom-nav-icon">🏃</span><span class="bottom-nav-text">健身</span></a>
        <a href="social.html" class="bottom-nav-item active"><span class="bottom-nav-icon">👥</span><span class="bottom-nav-text">广场</span></a>
        <a href="user.html" class="bottom-nav-item"><span class="bottom-nav-icon">👤</span><span class="bottom-nav-text">我的</span></a>
    </nav>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        if (!http.isAuthenticated()) window.location.href = '../login.html';

        // 加载导航栏用户信息
        async function loadNavbarUser() {
            try {
                const result = await api.getUserInfo();
                if (result.success && result.data) {
                    const user = result.data;
                    document.getElementById('userName').textContent = user.name || '用户';
                    const avatarEl = document.getElementById('userAvatar');
                    if (user.avatar) {
                        avatarEl.innerHTML = `<img src="${API_BASE_URL}${user.avatar}" alt="头像" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
                    } else {
                        avatarEl.textContent = (user.name || 'U')[0].toUpperCase();
                    }
                }
            } catch (e) {}
        }
        loadNavbarUser();

        const urlParams = new URLSearchParams(window.location.search);
        const profileUserId = parseInt(urlParams.get('userId'));

        if (!profileUserId) {
            location.href = 'social.html';
        }

        let isFollowingUser = false;
        let currentUserId = null;

        async function loadProfile() {
            // 获取当前用户ID
            const myInfo = await api.getUserInfo();
            if (myInfo.success && myInfo.data) {
                currentUserId = myInfo.data.id;
            }

            // 获取目标用户信息
            const result = await api.getUserInfo();
            // 由于getUserInfo只返回当前登录用户，我们用帖子来获取用户名
            const postsResult = await api.getPostsByUser(profileUserId);

            let userName = '用户' + profileUserId;
            let userAvatar = null;

            if (postsResult.success && postsResult.data && postsResult.data.length > 0) {
                userName = postsResult.data[0].user_name || userName;
            }

            // 设置头像
            const avatarEl = document.getElementById('profileAvatar');
            if (userAvatar) {
                avatarEl.innerHTML = `<img src="${API_BASE_URL}${userAvatar}" alt="头像">`;
            } else {
                avatarEl.textContent = userName[0].toUpperCase();
            }
            document.getElementById('profileName').textContent = userName;

            // 粉丝数和关注数
            const followerResult = await api.getFollowerCount(profileUserId);
            if (followerResult.success) document.getElementById('followerCount').textContent = followerResult.data || 0;

            const followingResult = await api.getFollowingCount(profileUserId);
            if (followingResult.success) document.getElementById('followingCount').textContent = followingResult.data || 0;

            // 总获赞数
            let totalLikes = 0;
            if (postsResult.success && postsResult.data) {
                totalLikes = postsResult.data.reduce((sum, p) => sum + (p.likes || 0), 0);
            }
            document.getElementById('totalLikes').textContent = totalLikes;

            // 关注按钮
            if (currentUserId && currentUserId !== profileUserId) {
                const followResult = await api.isFollowing(profileUserId);
                isFollowingUser = followResult.success && followResult.data === true;
                renderFollowButton();
            } else if (currentUserId === profileUserId) {
                document.getElementById('profileActions').innerHTML = `<button class="btn btn-outline" onclick="location.href='user.html'">编辑资料</button>`;
            }

            // 渲染帖子
            renderPosts(postsResult.success ? postsResult.data : []);
        }

        function renderFollowButton() {
            const actionsEl = document.getElementById('profileActions');
            if (isFollowingUser) {
                actionsEl.innerHTML = `<button class="btn btn-outline" onclick="toggleFollow()">已关注</button>`;
            } else {
                actionsEl.innerHTML = `<button class="btn btn-primary" onclick="toggleFollow()" style="background:#E91E63">关注</button>`;
            }
        }

        async function toggleFollow() {
            if (isFollowingUser) {
                const result = await api.unfollowUser(profileUserId);
                if (result.success) {
                    isFollowingUser = false;
                    utils.showToast('已取消关注', 'success');
                }
            } else {
                const result = await api.followUser(profileUserId);
                if (result.success) {
                    isFollowingUser = true;
                    utils.showToast('关注成功', 'success');
                }
            }
            renderFollowButton();
            // 刷新粉丝数
            const followerResult = await api.getFollowerCount(profileUserId);
            if (followerResult.success) document.getElementById('followerCount').textContent = followerResult.data || 0;
        }

        function renderPosts(posts) {
            const container = document.getElementById('postsList');
            if (!posts || posts.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><p>暂无帖子</p></div>';
                return;
            }

            // 置顶帖排前面
            const sorted = [...posts].sort((a, b) => (b.is_top || 0) - (a.is_top || 0));

            container.innerHTML = sorted.map(post => {
                const title = post.title || (post.content && post.content.length > 30 ? post.content.substring(0, 30) + '...' : post.content) || '无标题';
                const hasImage = post.image ? true : false;
                return `
                <div class="post-card" onclick="location.href='social-detail.html?id=${post.id}'">
                    ${post.is_top ? '<span class="post-top-badge">置顶</span>' : ''}
                    <div class="post-date">${post.date || ''}</div>
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
                        <div style="flex:1;">
                            <div class="post-title">${title}</div>
                        </div>
                        ${hasImage ? `<img class="post-image-thumb" src="${API_BASE_URL}${post.image}" alt="图片">` : ''}
                    </div>
                    <div class="post-meta">
                        <span>❤️ ${post.likes || 0}</span>
                        <span>💬 ${post.comments || 0}</span>
                    </div>
                </div>
                `;
            }).join('');
        }

        loadProfile();
    </script>
</body>
</html>
