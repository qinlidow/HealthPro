<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthPro - 睡眠管理</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .page-content { padding-top: 60px; padding-bottom: 80px; min-height: 100vh; background: var(--bg-secondary); }
        .page-header { background: linear-gradient(135deg, #9C27B0, #7B1FA2); padding: 30px 24px; color: white; }
        .page-header-content { max-width: 1200px; margin: 0 auto; }
        .page-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .main-content { max-width: 1200px; margin: -20px auto 0; padding: 0 24px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
        .stat-value { font-size: 32px; font-weight: 600; color: #9C27B0; }
        .stat-label { font-size: 14px; color: #757575; margin-top: 8px; }
        
        /* 图表区域 - 同一行布局 */
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
        .chart-section { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .chart-title { font-size: 18px; font-weight: 600; }
        
        /* 圆环图 */
        .donut-container { display: flex; align-items: center; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .donut-chart-wrapper { position: relative; width: 200px; height: 200px; }
        .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .donut-center-value { font-size: 28px; font-weight: 600; color: #9C27B0; }
        .donut-center-label { font-size: 12px; color: #757575; }
        .donut-legend { display: flex; flex-direction: column; gap: 12px; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 14px; height: 14px; border-radius: 4px; }
        .legend-text { font-size: 13px; color: #424242; }
        .legend-value { font-weight: 600; color: #212121; }
        
        /* 睡眠记录卡片 - 与饮食记录一致 */
        .records-section { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .records-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 18px; font-weight: 600; }
        
        .sleep-card { background: #FAFAFA; border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; cursor: pointer; transition: all 0.3s ease; border-left: 4px solid #9C27B0; }
        .sleep-card:hover { background: #F3E5F5; transform: translateX(4px); }
        .sleep-date { font-weight: 600; color: #9C27B0; margin-bottom: 10px; font-size: 15px; }
        .sleep-meal { display: flex; gap: 12px; flex-wrap: wrap; }
        .meal-item { flex: 1; min-width: 100px; background: white; border-radius: 8px; padding: 10px 12px; }
        .meal-label { font-size: 12px; color: #9E9E9E; margin-bottom: 4px; }
        .meal-content { font-size: 14px; color: #212121; }
        .sleep-actions { display: flex; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #E0E0E0; }
        .sleep-action-btn { padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #E0E0E0; background: white; color: #757575; transition: all 0.2s; }
        .sleep-action-btn:hover { border-color: #9C27B0; color: #9C27B0; }
        .sleep-action-btn.delete-btn:hover { border-color: #F44336; color: #F44336; }
        
        .fab { position: fixed; bottom: 90px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #9C27B0, #7B1FA2); color: white; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 12px rgba(156, 39, 176, 0.4); z-index: 100; }
        .fab:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand"><span>HealthPro</span></a>
        <div class="navbar-menu">
            <a href="index.html" class="navbar-item">首页</a>
            <a href="body.html" class="navbar-item">身体数据</a>
            <a href="diet.html" class="navbar-item">饮食记录</a>
            <a href="sleep.html" class="navbar-item active">睡眠管理</a>
            <a href="fitness.html" class="navbar-item">健身管理</a>
            <a href="social.html" class="navbar-item">社交广场</a>
        </div>
        <div class="navbar-user" onclick="location.href='user.html'"><div class="avatar" id="userAvatar">U</div><span class="navbar-user-name hide-mobile" id="userName">用户</span></div>
    </nav>
    
    <div class="page-content">
        <div class="page-header">
            <div class="page-header-content">
                <h1 class="page-title">😴 睡眠管理</h1>
                <p>监测睡眠质量，改善睡眠习惯</p>
            </div>
        </div>
        
        <div class="main-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="avgDuration">--</div>
                    <div class="stat-label">平均时长(小时)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgDeepSleep">--</div>
                    <div class="stat-label">平均深睡(小时)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgLightSleep">--</div>
                    <div class="stat-label">平均浅睡(小时)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalRecords">0</div>
                    <div class="stat-label">记录天数</div>
                </div>
            </div>
            
            <!-- 图表区域 - 同一行 -->
            <div class="charts-row">
                <!-- 平均睡眠占比圆环图 -->
                <div class="chart-section">
                    <div class="chart-header">
                        <h3 class="chart-title">🎯 平均睡眠占比</h3>
                    </div>
                    <div class="donut-container">
                        <div class="donut-chart-wrapper">
                            <canvas id="donutChart"></canvas>
                            <div class="donut-center">
                                <div class="donut-center-value" id="donutTotal">--</div>
                                <div class="donut-center-label">平均总时长</div>
                            </div>
                        </div>
                        <div class="donut-legend">
                            <div class="legend-item">
                                <div class="legend-color" style="background: #7B1FA2;"></div>
                                <div class="legend-text">深度睡眠: <span class="legend-value" id="legendDeep">--</span></div>
                            </div>
                            <div class="legend-item">
                                <div class="legend-color" style="background: #CE93D8;"></div>
                                <div class="legend-text">浅度睡眠: <span class="legend-value" id="legendLight">--</span></div>
                            </div>
                            <div class="legend-item">
                                <div class="legend-color" style="background: #E1BEE7;"></div>
                                <div class="legend-text">快速眼动: <span class="legend-value" id="legendRem">--</span></div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 睡眠趋势折线图 -->
                <div class="chart-section">
                    <div class="chart-header">
                        <h3 class="chart-title">📊 睡眠趋势</h3>
                    </div>
                    <canvas id="sleepChart" height="250"></canvas>
                </div>
            </div>
            
            <div class="records-section">
                <div class="records-header">
                    <h3 class="section-title">📋 睡眠记录</h3>
                    <button class="btn btn-primary btn-sm" onclick="showAddModal()">+ 添加记录</button>
                </div>
                <div id="recordsList"></div>
            </div>
        </div>
    </div>
    
    <button class="fab" onclick="showAddModal()">+</button>
    
    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item"><span class="bottom-nav-icon">🏠</span><span class="bottom-nav-text">首页</span></a>
        <a href="body.html" class="bottom-nav-item"><span class="bottom-nav-icon">💪</span><span class="bottom-nav-text">身体</span></a>
        <a href="diet.html" class="bottom-nav-item"><span class="bottom-nav-icon">🍽️</span><span class="bottom-nav-text">饮食</span></a>
        <a href="sleep.html" class="bottom-nav-item active"><span class="bottom-nav-icon">😴</span><span class="bottom-nav-text">睡眠</span></a>
        <a href="fitness.html" class="bottom-nav-item"><span class="bottom-nav-icon">🏃</span><span class="bottom-nav-text">健身</span></a>
        <a href="social.html" class="bottom-nav-item"><span class="bottom-nav-icon">👥</span><span class="bottom-nav-text">广场</span></a>
        <a href="user.html" class="bottom-nav-item"><span class="bottom-nav-icon">👤</span><span class="bottom-nav-text">我的</span></a>
    </nav>
    
    <!-- 添加/编辑模态框 -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">添加睡眠记录</h3>
                <button class="modal-close" onclick="closeModal('addModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">日期</label>
                    <input type="date" class="form-input" id="addDate">
                </div>
                <div class="form-group">
                    <label class="form-label">睡眠时长(小时)</label>
                    <input type="number" class="form-input" id="addDuration" step="0.1" min="0" max="24" value="8">
                </div>
                <div class="grid grid-3 gap-12">
                    <div class="form-group">
                        <label class="form-label">深度睡眠(小时)</label>
                        <input type="number" class="form-input" id="addDeepSleep" step="0.1" min="0" value="2">
                    </div>
                    <div class="form-group">
                        <label class="form-label">浅度睡眠(小时)</label>
                        <input type="number" class="form-input" id="addLightSleep" step="0.1" min="0" value="4">
                    </div>
                    <div class="form-group">
                        <label class="form-label">快速眼动(小时)</label>
                        <input type="number" class="form-input" id="addRemSleep" step="0.1" min="0" value="1.5">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('addModal')">取消</button>
                <button class="btn btn-primary" onclick="saveRecord()">保存</button>
            </div>
        </div>
    </div>
    
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        if (!http.isAuthenticated()) window.location.href = '../login.html';
        
        // 加载导航栏用户信息
        async function loadNavbarUser() {
            try {
                const result = await api.getUserInfo();
                if (result.success && result.data) {
                    const user = result.data;
                    document.getElementById('userName').textContent = user.name || '用户';
                    const avatarEl = document.getElementById('userAvatar');
                    if (user.avatar) {
                        avatarEl.innerHTML = `<img src="${API_BASE_URL}${user.avatar}" alt="头像" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
                    } else {
                        avatarEl.textContent = (user.name || 'U')[0].toUpperCase();
                    }
                }
            } catch (e) {}
        }
        loadNavbarUser();
        
        let sleepData = [];
        let editingId = null;
        let sleepChart = null;
        let donutChart = null;
        document.getElementById('addDate').value = utils.formatDate(new Date());
        
        async function loadData() {
            const container = document.getElementById('recordsList');
            container.innerHTML = '<div class="empty-state"><div class="loading"></div><p>加载中...</p></div>';
            
            try {
                const result = await api.getSleepData();
                if (result.success && result.data) {
                    sleepData = result.data.sort((a, b) => new Date(a.date) - new Date(b.date));
                    updateStats();
                    updateDonutChart();
                    updateChart();
                    updateRecords();
                } else {
                    sleepData = [];
                    updateStats();
                    updateDonutChart();
                    updateChart();
                    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">😴</div><p>暂无记录</p></div>';
                }
            } catch (error) {
                console.error('加载睡眠数据失败:', error);
                sleepData = [];
                updateStats();
                updateDonutChart();
                updateChart();
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>加载失败,请检查网络连接</p></div>';
            }
        }
        
        function updateStats() {
            if (sleepData.length === 0) {
                document.getElementById('avgDuration').textContent = '--';
                document.getElementById('avgDeepSleep').textContent = '--';
                document.getElementById('avgLightSleep').textContent = '--';
                document.getElementById('totalRecords').textContent = '0';
                return;
            }
            const avgDuration = sleepData.reduce((s, d) => s + d.duration, 0) / sleepData.length;
            const avgDeep = sleepData.reduce((s, d) => s + (d.deep_sleep || 0), 0) / sleepData.length;
            const avgLight = sleepData.reduce((s, d) => s + (d.light_sleep || 0), 0) / sleepData.length;
            
            document.getElementById('avgDuration').textContent = avgDuration.toFixed(1);
            document.getElementById('avgDeepSleep').textContent = avgDeep.toFixed(1);
            document.getElementById('avgLightSleep').textContent = avgLight.toFixed(1);
            document.getElementById('totalRecords').textContent = sleepData.length;
        }
        
        function updateDonutChart() {
            const canvas = document.getElementById('donutChart');
            if (!canvas) {
                console.error('找不到圆环图canvas元素');
                return;
            }
            
            const ctx = canvas.getContext('2d');
            
            if (donutChart) {
                donutChart.destroy();
                donutChart = null;
            }
            
            if (sleepData.length === 0) {
                document.getElementById('donutTotal').textContent = '--';
                document.getElementById('legendDeep').textContent = '--';
                document.getElementById('legendLight').textContent = '--';
                document.getElementById('legendRem').textContent = '--';
                return;
            }
            
            const avgDuration = sleepData.reduce((s, d) => s + d.duration, 0) / sleepData.length;
            const avgDeep = sleepData.reduce((s, d) => s + (d.deep_sleep || 0), 0) / sleepData.length;
            const avgLight = sleepData.reduce((s, d) => s + (d.light_sleep || 0), 0) / sleepData.length;
            const avgRem = sleepData.reduce((s, d) => s + (d.rem_sleep || 0), 0) / sleepData.length;
            
            document.getElementById('donutTotal').textContent = avgDuration.toFixed(1) + 'h';
            document.getElementById('legendDeep').textContent = avgDeep.toFixed(1) + 'h (' + ((avgDeep / avgDuration) * 100).toFixed(0) + '%)';
            document.getElementById('legendLight').textContent = avgLight.toFixed(1) + 'h (' + ((avgLight / avgDuration) * 100).toFixed(0) + '%)';
            document.getElementById('legendRem').textContent = avgRem.toFixed(1) + 'h (' + ((avgRem / avgDuration) * 100).toFixed(0) + '%)';
            
            try {
                donutChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['深度睡眠', '浅度睡眠', '快速眼动'],
                        datasets: [{
                            data: [avgDeep, avgLight, avgRem],
                            backgroundColor: ['#7B1FA2', '#CE93D8', '#E1BEE7'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        cutout: '65%',
                        plugins: {
                            legend: {
                                display: false
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const label = context.label || '';
                                        const value = context.parsed || 0;
                                        const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                        const percentage = ((value / total) * 100).toFixed(1);
                                        return `${label}: ${value.toFixed(1)}h (${percentage}%)`;
                                    }
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('创建圆环图失败:', error);
            }
        }
        
        function updateChart() {
            const canvas = document.getElementById('sleepChart');
            if (!canvas) {
                console.error('找不到趋势图canvas元素');
                return;
            }
            
            const ctx = canvas.getContext('2d');
            
            if (sleepChart) {
                sleepChart.destroy();
                sleepChart = null;
            }
            
            if (sleepData.length === 0) {
                return;
            }
            
            try {
                sleepChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: sleepData.slice(-7).map(d => d.date.substring(5)),
                        datasets: [
                            {
                                label: '睡眠时长(小时)',
                                data: sleepData.slice(-7).map(d => d.duration),
                                borderColor: '#9C27B0',
                                backgroundColor: 'rgba(156, 39, 176, 0.1)',
                                fill: true,
                                tension: 0.4,
                                pointRadius: 4,
                                pointHoverRadius: 6
                            },
                            {
                                label: '深度睡眠(小时)',
                                data: sleepData.slice(-7).map(d => d.deep_sleep || 0),
                                borderColor: '#7B1FA2',
                                backgroundColor: 'rgba(123, 31, 162, 0.1)',
                                fill: true,
                                tension: 0.4,
                                pointRadius: 4,
                                pointHoverRadius: 6
                            },
                            {
                                label: '浅度睡眠(小时)',
                                data: sleepData.slice(-7).map(d => d.light_sleep || 0),
                                borderColor: '#CE93D8',
                                backgroundColor: 'rgba(206, 147, 216, 0.1)',
                                fill: true,
                                tension: 0.4,
                                pointRadius: 4,
                                pointHoverRadius: 6
                            },
                            {
                                label: '快速眼动(小时)',
                                data: sleepData.slice(-7).map(d => d.rem_sleep || 0),
                                borderColor: '#E1BEE7',
                                backgroundColor: 'rgba(225, 190, 231, 0.1)',
                                fill: true,
                                tension: 0.4,
                                pointRadius: 4,
                                pointHoverRadius: 6
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        interaction: {
                            mode: 'index',
                            intersect: false
                        },
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                                labels: {
                                    usePointStyle: true,
                                    padding: 15,
                                    font: {
                                        size: 12
                                    }
                                }
                            },
                            tooltip: {
                                mode: 'index',
                                intersect: false,
                                padding: 10,
                                titleFont: {
                                    size: 14
                                },
                                bodyFont: {
                                    size: 13
                                }
                            }
                        },
                        scales: {
                            x: {
                                display: true,
                                grid: {
                                    display: false
                                },
                                ticks: {
                                    font: {
                                        size: 11
                                    }
                                }
                            },
                            y: {
                                display: true,
                                beginAtZero: true,
                                grid: {
                                    color: 'rgba(0, 0, 0, 0.05)'
                                },
                                ticks: {
                                    font: {
                                        size: 11
                                    },
                                    callback: function(value) {
                                        return value + 'h';
                                    }
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('创建趋势图失败:', error);
            }
        }
        
        function updateRecords() {
            const container = document.getElementById('recordsList');
            if (sleepData.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">😴</div><p>暂无记录，点击右下角按钮添加</p></div>';
                return;
            }
            container.innerHTML = sleepData.slice().reverse().map(record => `
                <div class="sleep-card" onclick="editRecord(${record.id})">
                    <div class="sleep-date">📅 ${record.date}</div>
                    <div class="sleep-meal">
                        <div class="meal-item">
                            <div class="meal-label">😴 睡眠时长</div>
                            <div class="meal-content">${record.duration}h</div>
                        </div>
                        <div class="meal-item">
                            <div class="meal-label">🌙 深度睡眠</div>
                            <div class="meal-content">${record.deep_sleep || 0}h</div>
                        </div>
                        <div class="meal-item">
                            <div class="meal-label">💤 浅度睡眠</div>
                            <div class="meal-content">${record.light_sleep || 0}h</div>
                        </div>
                        <div class="meal-item">
                            <div class="meal-label">👁️ 快速眼动</div>
                            <div class="meal-content">${record.rem_sleep || 0}h</div>
                        </div>
                    </div>
                    <div class="sleep-actions">
                        <button class="sleep-action-btn" onclick="event.stopPropagation(); editRecord(${record.id})">✏️ 修改</button>
                        <button class="sleep-action-btn delete-btn" onclick="event.stopPropagation(); deleteRecord(${record.id})">🗑️ 删除</button>
                    </div>
                </div>
            `).join('');
        }
        
        function showAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = '添加睡眠记录';
            document.getElementById('addDate').value = utils.formatDate(new Date());
            document.getElementById('addDuration').value = 8;
            document.getElementById('addDeepSleep').value = 2;
            document.getElementById('addLightSleep').value = 4;
            document.getElementById('addRemSleep').value = 1.5;
            document.getElementById('addModal').classList.add('active');
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        
        async function editRecord(id) {
            const record = sleepData.find(r => r.id === id);
            if (!record) return;
            
            editingId = id;
            document.getElementById('modalTitle').textContent = '编辑睡眠记录';
            document.getElementById('addDate').value = record.date;
            document.getElementById('addDuration').value = record.duration;
            document.getElementById('addDeepSleep').value = record.deep_sleep || 0;
            document.getElementById('addLightSleep').value = record.light_sleep || 0;
            document.getElementById('addRemSleep').value = record.rem_sleep || 0;
            document.getElementById('addModal').classList.add('active');
        }
        
        async function saveRecord() {
            const data = {
                date: document.getElementById('addDate').value,
                duration: parseFloat(document.getElementById('addDuration').value),
                deep_sleep: parseFloat(document.getElementById('addDeepSleep').value),
                light_sleep: parseFloat(document.getElementById('addLightSleep').value),
                rem_sleep: parseFloat(document.getElementById('addRemSleep').value)
            };
            
            if (!data.date) {
                utils.showToast('请选择日期', 'error');
                return;
            }
            
            let result;
            if (editingId) {
                result = await api.updateSleepData(editingId, data);
            } else {
                result = await api.addSleepData(data);
            }
            
            if (result.success) {
                utils.showToast(editingId ? '更新成功' : '添加成功', 'success');
                closeModal('addModal');
                loadData();
            } else {
                utils.showToast(result.message || '操作失败', 'error');
            }
        }
        
        async function deleteRecord(id) {
            if (!confirm('确定要删除这条记录吗？')) return;
            
            const result = await api.deleteSleepData(id);
            if (result.success) {
                utils.showToast('删除成功', 'success');
                loadData();
            } else {
                utils.showToast(result.message || '删除失败', 'error');
            }
        }
        
        loadData();
    </script>
</body>
</html>
