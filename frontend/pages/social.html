<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthPro - 社交广场</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .page-content { padding-top: 60px; padding-bottom: 80px; min-height: 100vh; background: var(--bg-secondary); }
        .page-header { background: linear-gradient(135deg, #E91E63, #C2185B); padding: 30px 24px; color: white; }
        .page-header-content { max-width: 1200px; margin: 0 auto; }
        .page-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .main-content { max-width: 800px; margin: -20px auto 0; padding: 0 24px; }

        .category-tabs { display: flex; gap: 12px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 8px; }
        .category-tab { padding: 10px 20px; border: none; background: white; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 500; white-space: nowrap; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .category-tab:hover { background: #FCE4EC; }
        .category-tab.active { background: #E91E63; color: white; }

        .sort-bar { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
        .sort-label { font-size: 13px; color: #9E9E9E; margin-right: 4px; }
        .sort-btn { padding: 6px 14px; border: 1px solid #E0E0E0; background: white; border-radius: 16px; cursor: pointer; font-size: 13px; color: #757575; transition: all 0.2s; }
        .sort-btn:hover { border-color: #E91E63; color: #E91E63; }
        .sort-btn.active { background: #FCE4EC; border-color: #E91E63; color: #E91E63; font-weight: 600; }

        .post-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 16px; cursor: pointer; transition: all 0.3s ease; }
        .post-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .post-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #E91E63, #C2185B); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 18px; flex-shrink: 0; overflow: hidden; cursor: pointer; }
        .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-author { flex: 1; }
        .post-author-name { font-weight: 600; font-size: 15px; cursor: pointer; }
        .post-author-name:hover { color: #E91E63; }
        .post-author-time { font-size: 12px; color: #9E9E9E; }
        .post-category { padding: 4px 12px; border-radius: 20px; font-size: 12px; background: #F5F5F5; color: #757575; }
        .post-top-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; background: #FF5722; color: white; font-weight: 600; }

        .post-title { font-size: 16px; font-weight: 600; color: #212121; margin-bottom: 8px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .post-image-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }

        .post-actions { display: flex; gap: 24px; padding-top: 12px; border-top: 1px solid #F0F0F0; }
        .post-action { display: flex; align-items: center; gap: 6px; color: #757575; cursor: pointer; transition: all 0.3s ease; background: none; border: none; font-size: 14px; }
        .post-action:hover { color: #E91E63; }
        .post-action.liked { color: #E91E63; }
        .post-action.favorited { color: #FF9800; }

        .fab { position: fixed; bottom: 90px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #E91E63, #C2185B); color: white; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 12px rgba(233, 30, 99, 0.4); z-index: 100; transition: all 0.3s ease; }
        .fab:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand"><span>HealthPro</span></a>
        <div class="navbar-menu">
            <a href="index.html" class="navbar-item">首页</a>
            <a href="body.html" class="navbar-item">身体数据</a>
            <a href="diet.html" class="navbar-item">饮食记录</a>
            <a href="sleep.html" class="navbar-item">睡眠管理</a>
            <a href="fitness.html" class="navbar-item">健身管理</a>
            <a href="social.html" class="navbar-item active">社交广场</a>
        </div>
        <div class="navbar-user" onclick="location.href='user.html'"><div class="avatar" id="userAvatar">U</div><span class="navbar-user-name hide-mobile" id="userName">用户</span></div>
    </nav>

    <div class="page-content">
        <div class="page-header">
            <div class="page-header-content">
                <h1 class="page-title">👥 社交广场</h1>
                <p>分享健康经验，交流养生心得</p>
            </div>
        </div>

        <div class="main-content">
            <!-- 分类标签 -->
            <div class="category-tabs">
                <button class="category-tab active" data-category="all">全部</button>
                <button class="category-tab" data-category="following">关注</button>
                <button class="category-tab" data-category="body">💪 身体数据</button>
                <button class="category-tab" data-category="diet">🍽️ 饮食记录</button>
                <button class="category-tab" data-category="sleep">😴 睡眠管理</button>
                <button class="category-tab" data-category="fitness">🏃 健身管理</button>
            </div>

            <!-- 排序栏 -->
            <div class="sort-bar">
                <span class="sort-label">排序：</span>
                <button class="sort-btn active" data-sort="time" onclick="changeSort('time')">最新发布</button>
                <button class="sort-btn" data-sort="likes" onclick="changeSort('likes')">最多点赞</button>
            </div>

            <!-- 帖子列表 -->
            <div id="postsList"></div>
        </div>
    </div>

    <button class="fab" onclick="location.href='social-post.html'">+</button>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item"><span class="bottom-nav-icon">🏠</span><span class="bottom-nav-text">首页</span></a>
        <a href="body.html" class="bottom-nav-item"><span class="bottom-nav-icon">💪</span><span class="bottom-nav-text">身体</span></a>
        <a href="diet.html" class="bottom-nav-item"><span class="bottom-nav-icon">🍽️</span><span class="bottom-nav-text">饮食</span></a>
        <a href="sleep.html" class="bottom-nav-item"><span class="bottom-nav-icon">😴</span><span class="bottom-nav-text">睡眠</span></a>
        <a href="fitness.html" class="bottom-nav-item"><span class="bottom-nav-icon">🏃</span><span class="bottom-nav-text">健身</span></a>
        <a href="social.html" class="bottom-nav-item active"><span class="bottom-nav-icon">👥</span><span class="bottom-nav-text">广场</span></a>
        <a href="user.html" class="bottom-nav-item"><span class="bottom-nav-icon">👤</span><span class="bottom-nav-text">我的</span></a>
    </nav>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        if (!http.isAuthenticated()) window.location.href = '../login.html';

        // 加载导航栏用户信息
        async function loadNavbarUser() {
            try {
                const result = await api.getUserInfo();
                if (result.success && result.data) {
                    const user = result.data;
                    document.getElementById('userName').textContent = user.name || '用户';
                    const avatarEl = document.getElementById('userAvatar');
                    if (user.avatar) {
                        avatarEl.innerHTML = `<img src="${API_BASE_URL}${user.avatar}" alt="头像" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
                    } else {
                        avatarEl.textContent = (user.name || 'U')[0].toUpperCase();
                    }
                }
            } catch (e) {}
        }
        loadNavbarUser();

        let postsData = [];
        let favoriteSet = new Set();
        let likedSet = new Set();
        let currentCategory = 'all';
        let currentSort = 'time';

        const categoryNames = {
            body: '💪 身体数据',
            diet: '🍽️ 饮食记录',
            sleep: '😴 睡眠管理',
            fitness: '🏃 健身管理'
        };

        async function loadPosts() {
            const container = document.getElementById('postsList');
            container.innerHTML = '<div class="empty-state"><div class="loading"></div><p>加载中...</p></div>';

            let result;
            if (currentCategory === 'following') {
                result = await api.getFollowingPosts();
            } else {
                result = await api.getPosts(currentCategory);
            }

            if (result.success && result.data) {
                postsData = result.data;
                await loadFavoriteStatus();
                await loadLikedStatus();
                renderPosts();
            } else {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><p>暂无动态，快来发布第一条吧</p></div>';
            }
        }

        function renderAvatar(post) {
            if (post.user_avatar) {
                return `<div class="post-avatar" onclick="event.stopPropagation(); location.href='profile.html?userId=${post.user_id}'"><img src="${API_BASE_URL}${post.user_avatar}" alt="头像"></div>`;
            }
            return `<div class="post-avatar" onclick="event.stopPropagation(); location.href='profile.html?userId=${post.user_id}'">${(post.user_name || 'U')[0].toUpperCase()}</div>`;
        }

        function renderPosts() {
            const container = document.getElementById('postsList');

            if (!postsData || postsData.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><p>暂无动态，快来发布第一条吧</p></div>';
                return;
            }

            // 排序：置顶帖始终在前，然后按排序方式排
            let sorted = [...postsData];
            sorted.sort((a, b) => {
                // 置顶优先
                if ((b.is_top || 0) !== (a.is_top || 0)) return (b.is_top || 0) - (a.is_top || 0);
                // 再按排序方式
                if (currentSort === 'likes') {
                    return (b.likes || 0) - (a.likes || 0);
                }
                // 默认按时间（id倒序）
                return (b.id || 0) - (a.id || 0);
            });

            container.innerHTML = sorted.map(post => {
                // 优先使用title字段，没有则截取content前30字
                const title = post.title || (post.content && post.content.length > 30 ? post.content.substring(0, 30) + '...' : post.content) || '无标题';
                const hasImage = post.image ? true : false;
                return `
                <div class="post-card" onclick="location.href='social-detail.html?id=${post.id}'">
                    <div class="post-header">
                        ${renderAvatar(post)}
                        <div class="post-author">
                            <div class="post-author-name" onclick="event.stopPropagation(); location.href='profile.html?userId=${post.user_id}'">${post.user_name || '匿名用户'}</div>
                            <div class="post-author-time">${post.date || ''}</div>
                        </div>
                        ${post.is_top ? '<span class="post-top-badge">置顶</span>' : ''}
                        <div class="post-category">${categoryNames[post.category] || '其他'}</div>
                    </div>
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
                        <div style="flex:1;">
                            <div class="post-title">${title}</div>
                        </div>
                        ${hasImage ? `<img class="post-image-thumb" src="${API_BASE_URL}${post.image}" alt="图片">` : ''}
                    </div>
                    <div class="post-actions">
                        <button class="post-action ${likedSet.has(post.id) ? 'liked' : ''}" onclick="event.stopPropagation(); toggleLike(${post.id})">
                            <span>${likedSet.has(post.id) ? '❤️' : '🤍'}</span>
                            <span>${post.likes}</span>
                        </button>
                        <button class="post-action" onclick="event.stopPropagation(); location.href='social-detail.html?id=${post.id}'">
                            <span>💬</span>
                            <span>${post.comments}</span>
                        </button>
                        <button class="post-action ${favoriteSet.has(post.id) ? 'favorited' : ''}" onclick="event.stopPropagation(); toggleFavorite(${post.id})">
                            <span>${favoriteSet.has(post.id) ? '⭐' : '☆'}</span>
                            <span>${favoriteSet.has(post.id) ? '已收藏' : '收藏'}</span>
                        </button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function changeSort(sort) {
            currentSort = sort;
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.sort-btn[data-sort="${sort}"]`).classList.add('active');
            renderPosts();
        }

        // 分类切换
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentCategory = tab.dataset.category;
                loadPosts();
            });
        });

        async function likePost(id) {
            const result = await api.likePost(id);
            if (result.success) {
                utils.showToast('点赞成功', 'success');
                loadPosts();
            } else {
                utils.showToast(result.message || '点赞失败', 'error');
            }
        }

        async function loadLikedStatus() {
            likedSet.clear();
            try {
                for (const post of postsData) {
                    const result = await api.isLiked(post.id);
                    if (result.success && result.data) {
                        likedSet.add(post.id);
                    }
                }
            } catch (e) {}
        }

        async function toggleLike(postId) {
            if (likedSet.has(postId)) {
                const result = await api.unlikePost(postId);
                if (result.success) {
                    likedSet.delete(postId);
                    utils.showToast('已取消点赞', 'success');
                    loadPosts();
                } else {
                    utils.showToast(result.message || '取消点赞失败', 'error');
                }
            } else {
                const result = await api.likePost(postId);
                if (result.success) {
                    likedSet.add(postId);
                    utils.showToast('点赞成功', 'success');
                    loadPosts();
                } else {
                    utils.showToast(result.message || '点赞失败', 'error');
                }
            }
        }

        async function loadFavoriteStatus() {
            favoriteSet.clear();
            try {
                const favResult = await api.getFavoritePosts();
                if (favResult.success && favResult.data) {
                    favResult.data.forEach(p => favoriteSet.add(p.id));
                }
            } catch (e) {}
        }

        async function toggleFavorite(postId) {
            if (favoriteSet.has(postId)) {
                const result = await api.unfavoritePost(postId);
                if (result.success) {
                    favoriteSet.delete(postId);
                    utils.showToast('已取消收藏', 'success');
                    renderPosts();
                } else {
                    utils.showToast(result.message || '取消收藏失败', 'error');
                }
            } else {
                const result = await api.favoritePost(postId);
                if (result.success) {
                    favoriteSet.add(postId);
                    utils.showToast('收藏成功', 'success');
                    renderPosts();
                } else {
                    utils.showToast(result.message || '收藏失败', 'error');
                }
            }
        }

        loadPosts();
    </script>
</body>
</html>
