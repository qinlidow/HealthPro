<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeHealth - 饮食记录</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .page-content { padding-top: 60px; padding-bottom: 80px; min-height: 100vh; background: var(--bg-secondary); }
        .page-header { background: linear-gradient(135deg, #FF9800, #F57C00); padding: 30px 24px; color: white; }
        .page-header-content { max-width: 1200px; margin: 0 auto; }
        .page-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .main-content { max-width: 800px; margin: -20px auto 0; padding: 0 24px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
        .stat-value { font-size: 28px; font-weight: 600; color: #FF9800; }
        .stat-label { font-size: 13px; color: #757575; margin-top: 6px; }

        .records-section { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 24px; }
        .records-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 18px; font-weight: 600; }

        .diet-card { background: #FAFAFA; border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; cursor: pointer; transition: all 0.3s ease; border-left: 4px solid #FF9800; }
        .diet-card:hover { background: #FFF3E0; transform: translateX(4px); }
        .diet-date { font-weight: 600; color: #FF9800; margin-bottom: 10px; font-size: 15px; }
        .diet-meal { display: flex; gap: 12px; flex-wrap: wrap; }
        .meal-item { flex: 1; min-width: 120px; background: white; border-radius: 8px; padding: 10px 12px; }
        .meal-label { font-size: 12px; color: #9E9E9E; margin-bottom: 4px; }
        .meal-content { font-size: 14px; color: #212121; }
        .diet-remark { font-size: 13px; color: #757575; padding-top: 10px; margin-top: 10px; border-top: 1px solid #E0E0E0; }
        .diet-actions { display: flex; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #E0E0E0; }
        .diet-action-btn { padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #E0E0E0; background: white; color: #757575; transition: all 0.2s; }
        .diet-action-btn:hover { border-color: #FF9800; color: #FF9800; }
        .diet-action-btn.delete-btn:hover { border-color: #F44336; color: #F44336; }

        .suggestion-section { background: linear-gradient(135deg, #FFF8E1, #FFECB3); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        .suggestion-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .suggestion-item { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; }

        .fab { position: fixed; bottom: 90px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #FF9800, #F57C00); color: white; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 12px rgba(255, 152, 0, 0.4); z-index: 100; transition: all 0.3s; }
        .fab:hover { transform: scale(1.1); }

        /* 模态框 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 16px; padding: 24px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 18px; font-weight: 600; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #9E9E9E; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; padding-top: 16px; border-top: 1px solid #F0F0F0; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand"><span>WeHealth</span></a>
        <div class="navbar-menu">
            <a href="index.html" class="navbar-item">首页</a>
            <a href="body.html" class="navbar-item">身体数据</a>
            <a href="diet.html" class="navbar-item active">饮食记录</a>
            <a href="sleep.html" class="navbar-item">睡眠管理</a>
            <a href="fitness.html" class="navbar-item">健身管理</a>
            <a href="social.html" class="navbar-item">社交广场</a>
            <a href="chat.html" class="navbar-item">AI助手</a>
        </div>
        <div class="navbar-user" onclick="location.href='user.html'"><div class="avatar" id="userAvatar">U</div><span class="navbar-user-name hide-mobile" id="userName">用户</span></div>
    </nav>

    <div class="page-content">
        <div class="page-header">
            <div class="page-header-content">
                <h1 class="page-title">饮食记录</h1>
                <p>科学管理每日饮食，保持营养均衡</p>
            </div>
        </div>

        <div class="main-content">
            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalRecords">0</div>
                    <div class="stat-label">记录天数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="streak">0</div>
                    <div class="stat-label">连续记录</div>
                </div>
            </div>

            <!-- 饮食记录列表（在建议上方） -->
            <div class="records-section">
                <div class="records-header">
                    <h3 class="section-title">📋 饮食记录</h3>
                    <button class="btn btn-primary btn-sm" onclick="showAddModal()">+ 添加记录</button>
                </div>
                <div id="recordsList"></div>
            </div>

            <!-- 饮食建议 -->
            <div class="suggestion-section">
                <h3 class="suggestion-title">💡 饮食建议</h3>
                <div id="suggestions">
                    <div class="suggestion-item">
                        <strong>🥗 均衡饮食</strong>
                        <p style="margin-top: 8px; color: #616161;">建议每餐包含碳水化合物、蛋白质、脂肪、维生素和矿物质，蔬菜水果应占每餐的一半。</p>
                    </div>
                    <div class="suggestion-item">
                        <strong>💧 多喝水</strong>
                        <p style="margin-top: 8px; color: #616161;">每天建议饮水1500-2000ml，分多次饮用效果更佳。</p>
                    </div>
                    <div class="suggestion-item">
                        <strong>⏰ 规律进餐</strong>
                        <p style="margin-top: 8px; color: #616161;">三餐定时定量，早餐7-8点，午餐12-13点，晚餐18-19点为宜。</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button class="fab" onclick="showAddModal()">+</button>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item"><span class="bottom-nav-icon">🏠</span><span class="bottom-nav-text">首页</span></a>
        <a href="body.html" class="bottom-nav-item"><span class="bottom-nav-icon">💪</span><span class="bottom-nav-text">身体</span></a>
        <a href="diet.html" class="bottom-nav-item active"><span class="bottom-nav-icon">🍽️</span><span class="bottom-nav-text">饮食</span></a>
        <a href="sleep.html" class="bottom-nav-item"><span class="bottom-nav-icon">😴</span><span class="bottom-nav-text">睡眠</span></a>
        <a href="fitness.html" class="bottom-nav-item"><span class="bottom-nav-icon">🏃</span><span class="bottom-nav-text">健身</span></a>
        <a href="social.html" class="bottom-nav-item"><span class="bottom-nav-icon">👥</span><span class="bottom-nav-text">广场</span></a>
        <a href="chat.html" class="bottom-nav-item"><span class="bottom-nav-icon">🤖</span><span class="bottom-nav-text">智能助理</span></a>
        <a href="user.html" class="bottom-nav-item"><span class="bottom-nav-icon">👤</span><span class="bottom-nav-text">我的</span></a>
    </nav>

    <!-- 添加记录模态框 -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">添加饮食记录</h3>
                <button class="modal-close" onclick="closeModal('addModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">日期</label>
                    <input type="date" class="form-input" id="addDate">
                </div>
                <div class="form-group">
                    <label class="form-label">早餐</label>
                    <input type="text" class="form-input" id="addBreakfast" placeholder="如：牛奶+面包+鸡蛋">
                </div>
                <div class="form-group">
                    <label class="form-label">午餐</label>
                    <input type="text" class="form-input" id="addLunch" placeholder="如：米饭+红烧肉+青菜">
                </div>
                <div class="form-group">
                    <label class="form-label">晚餐</label>
                    <input type="text" class="form-input" id="addDinner" placeholder="如：面条+水果">
                </div>
                <div class="form-group">
                    <label class="form-label">备注</label>
                    <input type="text" class="form-input" id="addRemark" placeholder="如：控制饮食摄入">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('addModal')">取消</button>
                <button class="btn btn-primary" onclick="saveRecord()">保存</button>
            </div>
        </div>
    </div>

    <!-- 修改记录模态框 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">修改饮食记录</h3>
                <button class="modal-close" onclick="closeModal('editModal')">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label class="form-label">日期</label>
                    <input type="date" class="form-input" id="editDate">
                </div>
                <div class="form-group">
                    <label class="form-label">早餐</label>
                    <input type="text" class="form-input" id="editBreakfast" placeholder="如：牛奶+面包+鸡蛋">
                </div>
                <div class="form-group">
                    <label class="form-label">午餐</label>
                    <input type="text" class="form-input" id="editLunch" placeholder="如：米饭+红烧肉+青菜">
                </div>
                <div class="form-group">
                    <label class="form-label">晚餐</label>
                    <input type="text" class="form-input" id="editDinner" placeholder="如：面条+水果">
                </div>
                <div class="form-group">
                    <label class="form-label">备注</label>
                    <input type="text" class="form-input" id="editRemark" placeholder="如：控制饮食摄入">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('editModal')">取消</button>
                <button class="btn btn-primary" onclick="updateRecord()">保存修改</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        if (!http.isAuthenticated()) window.location.href = '../login.html';

        // 加载导航栏用户信息
        async function loadNavbarUser() {
            try {
                const result = await api.getUserInfo();
                if (result.success && result.data) {
                    const user = result.data;
                    document.getElementById('userName').textContent = user.name || '用户';
                    const avatarEl = document.getElementById('userAvatar');
                    if (user.avatar) {
                        avatarEl.innerHTML = `<img src="${API_BASE_URL}${user.avatar}" alt="头像" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
                    } else {
                        avatarEl.textContent = (user.name || 'U')[0].toUpperCase();
                    }
                }
            } catch (e) {}
        }
        loadNavbarUser();

        let dietData = [];
        document.getElementById('addDate').value = utils.formatDate(new Date());

        async function loadData() {
            const result = await api.getDietData();
            if (result.success && result.data) {
                dietData = result.data.sort((a, b) => new Date(a.date) - new Date(b.date));
                updateStats();
                updateRecords();
            }
        }

        function updateStats() {
            document.getElementById('totalRecords').textContent = dietData.length;
            document.getElementById('streak').textContent = Math.min(dietData.length, 7);
        }

        function updateRecords() {
            const container = document.getElementById('recordsList');
            if (dietData.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🍽️</div><p>暂无记录，点击右下角按钮添加</p></div>';
                return;
            }
            container.innerHTML = dietData.slice().reverse().map(record => `
                <div class="diet-card" onclick="showEditModal(${record.id})">
                    <div class="diet-date">📅 ${record.date}</div>
                    <div class="diet-meal">
                        <div class="meal-item">
                            <div class="meal-label">🌅 早餐</div>
                            <div class="meal-content">${record.breakfast || '未记录'}</div>
                        </div>
                        <div class="meal-item">
                            <div class="meal-label">☀️ 午餐</div>
                            <div class="meal-content">${record.lunch || '未记录'}</div>
                        </div>
                        <div class="meal-item">
                            <div class="meal-label">🌙 晚餐</div>
                            <div class="meal-content">${record.dinner || '未记录'}</div>
                        </div>
                    </div>
                    ${record.remark ? `<div class="diet-remark">📝 ${record.remark}</div>` : ''}
                    <div class="diet-actions">
                        <button class="diet-action-btn" onclick="event.stopPropagation(); showEditModal(${record.id})">✏️ 修改</button>
                        <button class="diet-action-btn delete-btn" onclick="event.stopPropagation(); deleteRecord(${record.id})">🗑️ 删除</button>
                    </div>
                </div>
            `).join('');
        }

        function showAddModal() {
            document.getElementById('addDate').value = utils.formatDate(new Date());
            document.getElementById('addBreakfast').value = '';
            document.getElementById('addLunch').value = '';
            document.getElementById('addDinner').value = '';
            document.getElementById('addRemark').value = '';
            document.getElementById('addModal').classList.add('active');
        }

        function showEditModal(id) {
            const record = dietData.find(r => r.id === id);
            if (!record) return;
            document.getElementById('editId').value = record.id;
            document.getElementById('editDate').value = record.date || '';
            document.getElementById('editBreakfast').value = record.breakfast || '';
            document.getElementById('editLunch').value = record.lunch || '';
            document.getElementById('editDinner').value = record.dinner || '';
            document.getElementById('editRemark').value = record.remark || '';
            document.getElementById('editModal').classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        async function saveRecord() {
            const data = {
                date: document.getElementById('addDate').value,
                breakfast: document.getElementById('addBreakfast').value,
                lunch: document.getElementById('addLunch').value,
                dinner: document.getElementById('addDinner').value,
                remark: document.getElementById('addRemark').value
            };

            if (!data.date) {
                utils.showToast('请选择日期', 'error');
                return;
            }

            const result = await api.addDietData(data);
            if (result.success) {
                utils.showToast('添加成功', 'success');
                closeModal('addModal');
                loadData();
            } else {
                utils.showToast(result.message || '添加失败', 'error');
            }
        }

        async function updateRecord() {
            const id = parseInt(document.getElementById('editId').value);
            const data = {
                date: document.getElementById('editDate').value,
                breakfast: document.getElementById('editBreakfast').value,
                lunch: document.getElementById('editLunch').value,
                dinner: document.getElementById('editDinner').value,
                remark: document.getElementById('editRemark').value
            };

            if (!data.date) {
                utils.showToast('请选择日期', 'error');
                return;
            }

            const result = await api.updateDietData(id, data);
            if (result.success) {
                utils.showToast('修改成功', 'success');
                closeModal('editModal');
                loadData();
            } else {
                utils.showToast(result.message || '修改失败', 'error');
            }
        }

        async function deleteRecord(id) {
            if (!confirm('确定删除该记录吗？')) return;
            const result = await api.deleteDietData(id);
            if (result.success) {
                utils.showToast('删除成功', 'success');
                loadData();
            } else {
                utils.showToast(result.message || '删除失败', 'error');
            }
        }

        loadData();
    </script>
</body>
</html>
