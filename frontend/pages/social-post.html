<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthPro - 发布动态</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .page-content { padding-top: 60px; padding-bottom: 80px; min-height: 100vh; background: var(--bg-secondary); }
        .main-content { max-width: 800px; margin: 0 auto; padding: 0 24px; }

        .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 0; color: #757575; cursor: pointer; font-size: 15px; background: none; border: none; }
        .back-btn:hover { color: #E91E63; }

        .post-form { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .form-title { font-size: 20px; font-weight: 600; margin-bottom: 24px; }

        .content-textarea { width: 100%; padding: 16px; border: 1px solid #E0E0E0; border-radius: 12px; font-size: 15px; line-height: 1.8; resize: none; outline: none; transition: border-color 0.3s; min-height: 200px; }
        .content-textarea:focus { border-color: #E91E63; }

        .image-upload-area { margin-top: 16px; }
        .image-preview { position: relative; display: inline-block; margin-right: 12px; margin-bottom: 12px; }
        .image-preview img { width: 120px; height: 120px; object-fit: cover; border-radius: 12px; border: 2px solid #F0F0F0; }
        .image-remove { position: absolute; top: -8px; right: -8px; width: 24px; height: 24px; border-radius: 50%; background: #F44336; color: white; border: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
        .image-upload-btn { display: inline-flex; align-items: center; justify-content: center; width: 120px; height: 120px; border: 2px dashed #E0E0E0; border-radius: 12px; cursor: pointer; font-size: 32px; color: #BDBDBD; transition: all 0.3s; vertical-align: top; }
        .image-upload-btn:hover { border-color: #E91E63; color: #E91E63; }

        .form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 1px solid #F0F0F0; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand"><div class="navbar-brand-icon">💚</div><span>HealthPro</span></a>
        <div class="navbar-menu">
            <a href="index.html" class="navbar-item">首页</a>
            <a href="body.html" class="navbar-item">身体数据</a>
            <a href="diet.html" class="navbar-item">饮食记录</a>
            <a href="sleep.html" class="navbar-item">睡眠管理</a>
            <a href="fitness.html" class="navbar-item">健身管理</a>
            <a href="social.html" class="navbar-item active">社交广场</a>
        </div>
        <div class="navbar-user" onclick="location.href='user.html'"><div class="avatar" id="userAvatar">U</div><span class="navbar-user-name hide-mobile" id="userName">用户</span></div>
    </nav>

    <div class="page-content">
        <div class="main-content">
            <button class="back-btn" onclick="location.href='social.html'">← 返回广场</button>

            <div class="post-form">
                <h2 class="form-title">发布动态</h2>

                <div class="form-group">
                    <label class="form-label">分类</label>
                    <select class="form-select" id="postCategory">
                        <option value="body">💪 身体数据</option>
                        <option value="diet">🍽️ 饮食记录</option>
                        <option value="sleep">😴 睡眠管理</option>
                        <option value="fitness">🏃 健身管理</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">标题</label>
                    <input type="text" class="form-input" id="postTitle" placeholder="请输入标题" maxlength="50" style="width:100%;padding:12px 16px;border:1px solid #E0E0E0;border-radius:12px;font-size:15px;outline:none;transition:border-color 0.3s;" onfocus="this.style.borderColor='#E91E63'" onblur="this.style.borderColor='#E0E0E0'">
                </div>

                <div class="form-group">
                    <label class="form-label">内容</label>
                    <textarea class="content-textarea" id="postContent" placeholder="分享你的健康经验..."></textarea>
                </div>

                <div class="image-upload-area">
                    <label class="form-label">图片（可选）</label>
                    <div id="imagePreviewArea"></div>
                    <div class="image-upload-btn" id="uploadBtn" onclick="document.getElementById('imageInput').click()">+</div>
                    <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageSelect(event)">
                </div>

                <div class="form-actions">
                    <button class="btn btn-outline" onclick="location.href='social.html'">取消</button>
                    <button class="btn btn-primary" id="publishBtn" onclick="publishPost()">发布</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item"><span class="bottom-nav-icon">🏠</span><span class="bottom-nav-text">首页</span></a>
        <a href="body.html" class="bottom-nav-item"><span class="bottom-nav-icon">💪</span><span class="bottom-nav-text">身体</span></a>
        <a href="diet.html" class="bottom-nav-item"><span class="bottom-nav-icon">🍽️</span><span class="bottom-nav-text">饮食</span></a>
        <a href="fitness.html" class="bottom-nav-item"><span class="bottom-nav-icon">🏃</span><span class="bottom-nav-text">健身</span></a>
        <a href="social.html" class="bottom-nav-item active"><span class="bottom-nav-icon">👥</span><span class="bottom-nav-text">广场</span></a>
        <a href="user.html" class="bottom-nav-item"><span class="bottom-nav-icon">👤</span><span class="bottom-nav-text">我的</span></a>
    </nav>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        if (!http.isAuthenticated()) window.location.href = '../login.html';

        // 加载导航栏用户信息
        async function loadNavbarUser() {
            try {
                const result = await api.getUserInfo();
                if (result.success && result.data) {
                    const user = result.data;
                    document.getElementById('userName').textContent = user.name || '用户';
                    const avatarEl = document.getElementById('userAvatar');
                    if (user.avatar) {
                        avatarEl.innerHTML = `<img src="${API_BASE_URL}${user.avatar}" alt="头像" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
                    } else {
                        avatarEl.textContent = (user.name || 'U')[0].toUpperCase();
                    }
                }
            } catch (e) {}
        }
        loadNavbarUser();

        let uploadedImageUrl = null;

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                utils.showToast('请选择图片文件', 'error');
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                utils.showToast('图片大小不能超过10MB', 'error');
                return;
            }

            // 预览
            const reader = new FileReader();
            reader.onload = function(e) {
                const previewArea = document.getElementById('imagePreviewArea');
                previewArea.innerHTML = `
                    <div class="image-preview">
                        <img src="${e.target.result}" alt="预览">
                        <button class="image-remove" onclick="removeImage()">×</button>
                    </div>
                `;
                document.getElementById('uploadBtn').style.display = 'none';
            };
            reader.readAsDataURL(file);

            // 上传
            uploadImage(file);
        }

        async function uploadImage(file) {
            utils.showToast('正在上传图片...', 'info');
            const result = await api.uploadFile(file);
            if (result.success && result.data) {
                uploadedImageUrl = result.data;
                utils.showToast('图片上传成功', 'success');
            } else {
                utils.showToast(result.message || '图片上传失败', 'error');
                removeImage();
            }
        }

        function removeImage() {
            uploadedImageUrl = null;
            document.getElementById('imagePreviewArea').innerHTML = '';
            document.getElementById('uploadBtn').style.display = '';
            document.getElementById('imageInput').value = '';
        }

        async function publishPost() {
            const category = document.getElementById('postCategory').value;
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();

            if (!title) {
                utils.showToast('请输入标题', 'error');
                return;
            }

            if (!content) {
                utils.showToast('请输入内容', 'error');
                return;
            }

            const btn = document.getElementById('publishBtn');
            btn.disabled = true;
            btn.textContent = '发布中...';

            const today = new Date();
            const dateStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

            const postData = {
                category: category,
                title: title,
                content: content,
                image: uploadedImageUrl || null,
                date: dateStr
            };

            const result = await api.addPost(postData);
            if (result.success) {
                utils.showToast('发布成功', 'success');
                setTimeout(() => { location.href = 'social.html'; }, 1000);
            } else {
                utils.showToast(result.message || '发布失败', 'error');
                btn.disabled = false;
                btn.textContent = '发布';
            }
        }
    </script>
</body>
</html>
