<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthPro - 我的收藏</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .page-content { padding-top: 60px; padding-bottom: 80px; min-height: 100vh; background: var(--bg-secondary); }
        .page-header { background: linear-gradient(135deg, #FF9800, #F57C00); padding: 30px 24px; color: white; }
        .page-header-content { max-width: 1200px; margin: 0 auto; }
        .page-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .main-content { max-width: 800px; margin: -20px auto 0; padding: 0 24px; }

        .post-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 16px; cursor: pointer; transition: all 0.3s ease; }
        .post-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .post-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #FF9800, #F57C00); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 18px; flex-shrink: 0; overflow: hidden; cursor: pointer; }
        .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-author { flex: 1; }
        .post-author-name { font-weight: 600; font-size: 15px; cursor: pointer; }
        .post-author-name:hover { color: #FF9800; }
        .post-author-time { font-size: 12px; color: #9E9E9E; }
        .post-category { padding: 4px 12px; border-radius: 20px; font-size: 12px; background: #F5F5F5; color: #757575; }

        .post-title { font-size: 16px; font-weight: 600; color: #212121; margin-bottom: 8px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .post-image-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }

        .post-actions { display: flex; gap: 24px; padding-top: 12px; border-top: 1px solid #F0F0F0; }
        .post-action { display: flex; align-items: center; gap: 6px; color: #757575; cursor: pointer; transition: all 0.3s ease; background: none; border: none; font-size: 14px; }
        .post-action:hover { color: #FF9800; }
        .post-action.favorited { color: #FF9800; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand"><span>HealthPro</span></a>
        <div class="navbar-menu">
            <a href="index.html" class="navbar-item">首页</a>
            <a href="body.html" class="navbar-item">身体数据</a>
            <a href="diet.html" class="navbar-item">饮食记录</a>
            <a href="sleep.html" class="navbar-item">睡眠管理</a>
            <a href="fitness.html" class="navbar-item">健身管理</a>
            <a href="social.html" class="navbar-item">社交广场</a>
        </div>
        <div class="navbar-user" onclick="location.href='user.html'"><div class="avatar" id="userAvatar">U</div><span class="navbar-user-name hide-mobile" id="userName">用户</span></div>
    </nav>

    <div class="page-content">
        <div class="page-header">
            <div class="page-header-content">
                <h1 class="page-title">⭐ 我的收藏</h1>
                <p>收藏的精彩帖子</p>
            </div>
        </div>

        <div class="main-content">
            <div id="postsList"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item"><span class="bottom-nav-icon">🏠</span><span class="bottom-nav-text">首页</span></a>
        <a href="body.html" class="bottom-nav-item"><span class="bottom-nav-icon">💪</span><span class="bottom-nav-text">身体</span></a>
        <a href="diet.html" class="bottom-nav-item"><span class="bottom-nav-icon">🍽️</span><span class="bottom-nav-text">饮食</span></a>
        <a href="sleep.html" class="bottom-nav-item"><span class="bottom-nav-icon">😴</span><span class="bottom-nav-text">睡眠</span></a>
        <a href="fitness.html" class="bottom-nav-item"><span class="bottom-nav-icon">🏃</span><span class="bottom-nav-text">健身</span></a>
        <a href="social.html" class="bottom-nav-item"><span class="bottom-nav-icon">👥</span><span class="bottom-nav-text">广场</span></a>
        <a href="user.html" class="bottom-nav-item active"><span class="bottom-nav-icon">👤</span><span class="bottom-nav-text">我的</span></a>
    </nav>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        if (!http.isAuthenticated()) window.location.href = '../login.html';

        // 加载导航栏用户信息
        async function loadNavbarUser() {
            try {
                const result = await api.getUserInfo();
                if (result.success && result.data) {
                    const user = result.data;
                    document.getElementById('userName').textContent = user.name || '用户';
                    const avatarEl = document.getElementById('userAvatar');
                    if (user.avatar) {
                        avatarEl.innerHTML = `<img src="${API_BASE_URL}${user.avatar}" alt="头像" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
                    } else {
                        avatarEl.textContent = (user.name || 'U')[0].toUpperCase();
                    }
                }
            } catch (e) {}
        }
        loadNavbarUser();

        const categoryNames = {
            body: '💪 身体数据',
            diet: '🍽️ 饮食记录',
            sleep: '😴 睡眠管理',
            fitness: '🏃 健身管理'
        };

        async function loadFavorites() {
            const container = document.getElementById('postsList');
            container.innerHTML = '<div class="empty-state"><div class="loading"></div><p>加载中...</p></div>';

            const result = await api.getFavoritePosts();
            if (result.success && result.data && result.data.length > 0) {
                renderPosts(result.data);
            } else {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⭐</div><p>暂无收藏，去社交广场看看吧</p></div>';
            }
        }

        function renderAvatar(post) {
            if (post.user_avatar) {
                return `<div class="post-avatar" onclick="event.stopPropagation(); location.href='profile.html?userId=${post.user_id}'"><img src="${API_BASE_URL}${post.user_avatar}" alt="头像"></div>`;
            }
            return `<div class="post-avatar" onclick="event.stopPropagation(); location.href='profile.html?userId=${post.user_id}'">${(post.user_name || 'U')[0].toUpperCase()}</div>`;
        }

        function renderPosts(posts) {
            const container = document.getElementById('postsList');
            container.innerHTML = posts.map(post => {
                const title = post.title || (post.content && post.content.length > 30 ? post.content.substring(0, 30) + '...' : post.content) || '无标题';
                const hasImage = post.image ? true : false;
                return `
                <div class="post-card" onclick="location.href='social-detail.html?id=${post.id}'">
                    <div class="post-header">
                        ${renderAvatar(post)}
                        <div class="post-author">
                            <div class="post-author-name" onclick="event.stopPropagation(); location.href='profile.html?userId=${post.user_id}'">${post.user_name || '匿名用户'}</div>
                            <div class="post-author-time">${post.date || ''}</div>
                        </div>
                        <div class="post-category">${categoryNames[post.category] || '其他'}</div>
                    </div>
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
                        <div style="flex:1;">
                            <div class="post-title">${title}</div>
                        </div>
                        ${hasImage ? `<img class="post-image-thumb" src="${API_BASE_URL}${post.image}" alt="图片">` : ''}
                    </div>
                    <div class="post-actions">
                        <button class="post-action" onclick="event.stopPropagation(); likePost(${post.id})">
                            <span>❤️</span>
                            <span>${post.likes}</span>
                        </button>
                        <button class="post-action" onclick="event.stopPropagation(); location.href='social-detail.html?id=${post.id}'">
                            <span>💬</span>
                            <span>${post.comments}</span>
                        </button>
                        <button class="post-action favorited" onclick="event.stopPropagation(); unfavoritePost(${post.id})">
                            <span>⭐</span>
                            <span>已收藏</span>
                        </button>
                    </div>
                </div>
                `;
            }).join('');
        }

        async function likePost(id) {
            const result = await api.likePost(id);
            if (result.success) {
                utils.showToast('点赞成功', 'success');
                loadFavorites();
            } else {
                utils.showToast(result.message || '点赞失败', 'error');
            }
        }

        async function unfavoritePost(postId) {
            const result = await api.unfavoritePost(postId);
            if (result.success) {
                utils.showToast('已取消收藏', 'success');
                loadFavorites();
            } else {
                utils.showToast(result.message || '取消收藏失败', 'error');
            }
        }

        loadFavorites();
    </script>
</body>
</html>
