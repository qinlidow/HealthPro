<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeHealth - 健身管理</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .page-content { padding-top: 60px; padding-bottom: 80px; min-height: 100vh; background: var(--bg-secondary); }
        .page-header { background: linear-gradient(135deg, #2196F3, #1976D2); padding: 30px 24px; color: white; }
        .page-header-content { max-width: 1200px; margin: 0 auto; }
        .page-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .main-content { max-width: 1200px; margin: -20px auto 0; padding: 0 24px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
        .stat-value { font-size: 32px; font-weight: 600; color: #2196F3; }
        .stat-label { font-size: 14px; color: #757575; margin-top: 8px; }
        
        /* 打卡日历 + 趋势图 同一行 */
        .checkin-chart-row { display: flex; gap: 24px; margin-bottom: 24px; }
        .checkin-section { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); flex: 1; min-width: 0; }
        .checkin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .checkin-title { font-size: 16px; font-weight: 600; }
        .checkin-stats { display: flex; gap: 20px; margin-bottom: 10px; }
        .checkin-stat { display: flex; align-items: center; gap: 6px; }
        .checkin-stat-value { font-size: 20px; font-weight: 600; color: #4CAF50; }
        .checkin-stat-label { font-size: 12px; color: #757575; }
        .checkin-btn { padding: 8px 20px; background: linear-gradient(135deg, #4CAF50, #388E3C); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.3s; box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3); }
        .checkin-btn:hover { transform: scale(1.05); }
        .checkin-btn:disabled { background: #BDBDBD; box-shadow: none; cursor: default; transform: none; }
        .checkin-calendar { margin-top: 10px; }
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .calendar-nav-btn { background: none; border: 1px solid #E0E0E0; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; color: #757575; transition: all 0.2s; }
        .calendar-nav-btn:hover { border-color: #2196F3; color: #2196F3; }
        .calendar-month-label { font-size: 14px; font-weight: 600; color: #212121; }
        .calendar-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 2px; }
        .calendar-weekday { text-align: center; font-size: 11px; color: #9E9E9E; font-weight: 500; padding: 2px 0; }
        .calendar-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .calendar-day { aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #757575; cursor: pointer; transition: all 0.2s; position: relative; }
        .calendar-day:hover { background: #F5F5F5; }
        .calendar-day.empty { cursor: default; }
        .calendar-day.empty:hover { background: transparent; }
        .calendar-day.checked { background: #4CAF50; color: white; font-weight: 600; }
        .calendar-day.checked:hover { background: #388E3C; }
        .calendar-day.today { border: 2px solid #2196F3; }
        .calendar-day.future { color: #BDBDBD; cursor: default; }
        .calendar-day.future:hover { background: transparent; }
        .chart-section-inline { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); flex: 1; min-width: 0; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .chart-title { font-size: 18px; font-weight: 600; }
        
        /* 图表区域 - 同一行布局 */
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
        .chart-section { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        
        /* 健身记录卡片 - 与饮食记录一致 */
        .records-section { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .records-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 18px; font-weight: 600; }
        
        .fitness-card { background: #FAFAFA; border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; cursor: pointer; transition: all 0.3s ease; border-left: 4px solid #2196F3; }
        .fitness-card:hover { background: #E3F2FD; transform: translateX(4px); }
        .fitness-date { font-weight: 600; color: #2196F3; margin-bottom: 10px; font-size: 15px; }
        .fitness-type-tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; background: #E3F2FD; color: #1565C0; margin-left: 8px; }
        .fitness-meal { display: flex; gap: 12px; flex-wrap: wrap; }
        .meal-item { flex: 1; min-width: 100px; background: white; border-radius: 8px; padding: 10px 12px; }
        .meal-label { font-size: 12px; color: #9E9E9E; margin-bottom: 4px; }
        .meal-content { font-size: 14px; color: #212121; }
        .fitness-actions { display: flex; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #E0E0E0; }
        .fitness-action-btn { padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #E0E0E0; background: white; color: #757575; transition: all 0.2s; }
        .fitness-action-btn:hover { border-color: #2196F3; color: #2196F3; }
        .fitness-action-btn.delete-btn:hover { border-color: #F44336; color: #F44336; }
        
        .fab { position: fixed; bottom: 90px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #2196F3, #1976D2); color: white; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 12px rgba(33, 150, 243, 0.4); z-index: 100; }
        .fab:hover { transform: scale(1.1); }
        
        @media (max-width: 900px) {
            .checkin-chart-row { flex-direction: column; }
        }
    </style>
</head>

    <div class="page-content">
        <div class="page-header">
            <div class="page-header-content">
                <h1 class="page-title">健身管理</h1>
                <p>记录运动数据，追踪健身效果</p>

        <div class="main-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalWorkouts">0</div>
                    <div class="stat-label">运动次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalCalories">0</div>
                    <div class="stat-label">总消耗(kcal)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalDuration">0</div>
                    <div class="stat-label">总时长(分钟)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgHeartRate">--</div>
                    <div class="stat-label">平均心率</div>
                </div>
            </div>
            
            <!-- 打卡日历 + 趋势图 同一行 -->
            <div class="checkin-chart-row">
                <div class="checkin-section">
                    <div class="checkin-header">
                        <h3 class="checkin-title">📅 每日打卡</h3>
                        <button class="checkin-btn" id="checkInBtn" onclick="handleCheckIn()">今日打卡</button>
                    </div>
                    <div class="checkin-stats">

                        </div>
                        <div class="checkin-stat">

                    <div class="checkin-calendar">
                        <div class="calendar-nav">
                            <button class="calendar-nav-btn" onclick="changeMonth(-1)">◀ 上月</button>
                            <span class="calendar-month-label" id="calendarMonthLabel"></span>
                            <button class="calendar-nav-btn" onclick="changeMonth(1)">下月 ▶</button>
                        </div>
                        <div class="calendar-weekdays">

                            <div class="calendar-weekday">二</div>
                            <div class="calendar-weekday">三</div>
                            <div class="calendar-weekday">四</div>
                            <div class="calendar-weekday">五</div>
                            <div class="calendar-weekday">六</div>
                            <div class="calendar-weekday">日</div>
                        </div>
                        <div class="calendar-days" id="calendarDays"></div>
                    </div>
                </div>
                <div class="chart-section-inline">

                    </div>

            </div>
            
            <!-- 图表区域 - 同一行 -->
            <div class="charts-row">
                <div class="chart-section">
                    <div class="chart-header">
                        <h3 class="chart-title">📊 卡路里消耗趋势</h3>
                    </div>
                    <canvas id="caloriesChart" height="250"></canvas>
                </div>
                <div class="chart-section">

            <div class="records-section">

    <!-- 添加/编辑模态框 -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">

                <h3 class="modal-title" id="modalTitle">添加运动记录</h3>
                <button class="modal-close" onclick="closeModal('addModal')">×</button>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        if (!http.isAuthenticated()) window.location.href = '../login.html';
        
        // 加载导航栏用户信息
        async function loadNavbarUser() {
            try {
                const result = await api.getUserInfo();
                if (result.success && result.data) {
                    const user = result.data;
                    document.getElementById('userName').textContent = user.name || '用户';
                    const avatarEl = document.getElementById('userAvatar');
                    if (user.avatar) {
                        avatarEl.innerHTML = `<img src="${API_BASE_URL}${user.avatar}" alt="头像" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
                    } else {
                        avatarEl.textContent = (user.name || 'U')[0].toUpperCase();
                    }
                }
            } catch (e) {}
        }
        loadNavbarUser();
        
        // ==================== 打卡日历 ====================
        let calendarYear, calendarMonth;
        let checkedDates = new Set();
        let todayCheckedIn = false;
        
        (function initCalendar() {
            const now = new Date();
            calendarYear = now.getFullYear();
            calendarMonth = now.getMonth();
        })();
        
        async function loadCheckInData() {
            try {
                const [countResult, streakResult] = await Promise.all([
                    api.getCheckInCount(),
                    api.getCheckInStreak()
                ]);
                if (countResult.success && countResult.data !== undefined) {
                    document.getElementById('checkInCount').textContent = countResult.data;
                }
                if (streakResult.success && streakResult.data !== undefined) {
                    document.getElementById('checkInStreak').textContent = streakResult.data;
                }
            } catch (e) { console.error('加载打卡统计失败:', e); }
            
            const todayStr = formatDateStr(new Date());
            try {
                const result = await api.isCheckedIn(todayStr);
                if (result.success && result.data === true) {
                    todayCheckedIn = true;
                    document.getElementById('checkInBtn').textContent = '今日已打卡';
                    document.getElementById('checkInBtn').disabled = true;
                } else {
                    todayCheckedIn = false;
                    document.getElementById('checkInBtn').textContent = '今日打卡';
                    document.getElementById('checkInBtn').disabled = false;
                }
            } catch (e) { console.error('检查打卡状态失败:', e); }
            
            await loadMonthCheckIns();
        }
        
        async function loadMonthCheckIns() {
            const yearMonth = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}`;
            try {
                const result = await api.getCheckInByMonth(yearMonth);
                if (result.success && result.data) {
                    checkedDates.clear();
                    result.data.forEach(item => checkedDates.add(item.date));
                }
            } catch (e) {}
            renderCalendar();
        }
        
        function formatDateStr(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }
        
        function renderCalendar() {
            const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
            document.getElementById('calendarMonthLabel').textContent = `${calendarYear}年 ${monthNames[calendarMonth]}`;
            
            const container = document.getElementById('calendarDays');
            const firstDay = new Date(calendarYear, calendarMonth, 1);
            const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();
            let startWeekday = firstDay.getDay() - 1;
            if (startWeekday < 0) startWeekday = 6;
            
            const now = new Date();
            const todayStr = formatDateStr(now);
            const todayYear = now.getFullYear();
            const todayMonth = now.getMonth();
            const todayDate = now.getDate();
            
            let html = '';
            for (let i = 0; i < startWeekday; i++) {
                html += '<div class="calendar-day empty"></div>';
            }
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isChecked = checkedDates.has(dateStr);
                const isToday = dateStr === todayStr;
                const isFuture = (calendarYear > todayYear) || (calendarYear === todayYear && calendarMonth > todayMonth) || (calendarYear === todayYear && calendarMonth === todayMonth && day > todayDate);
                
                let classes = 'calendar-day';
                if (isChecked) classes += ' checked';
                if (isToday) classes += ' today';
                if (isFuture) classes += ' future';
                
                html += `<div class="${classes}" data-date="${dateStr}" onclick="handleDayClick('${dateStr}')">${day}</div>`;
            }
            container.innerHTML = html;
        }
        
        function changeMonth(delta) {
            calendarMonth += delta;
            if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
            if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
            loadMonthCheckIns();
        }
        
        async function handleCheckIn() {
            const todayStr = formatDateStr(new Date());
            const result = await api.doCheckIn(todayStr);
            if (result.success) {
                todayCheckedIn = true;
                checkedDates.add(todayStr);
                document.getElementById('checkInBtn').textContent = '今日已打卡';
                document.getElementById('checkInBtn').disabled = true;
                utils.showToast('打卡成功！', 'success');
                const [countResult, streakResult] = await Promise.all([api.getCheckInCount(), api.getCheckInStreak()]);
                if (countResult.success && countResult.data !== undefined) document.getElementById('checkInCount').textContent = countResult.data;
                if (streakResult.success && streakResult.data !== undefined) document.getElementById('checkInStreak').textContent = streakResult.data;
                renderCalendar();
            } else {
                utils.showToast(result.message || '打卡失败', 'error');
            }
        }
        
        async function handleDayClick(dateStr) {
            if (checkedDates.has(dateStr)) return;
            const todayStr = formatDateStr(new Date());
            if (dateStr !== todayStr) return;
            const result = await api.doCheckIn(dateStr);
            if (result.success) {
                checkedDates.add(dateStr);
                if (dateStr === todayStr) {
                    todayCheckedIn = true;
                    document.getElementById('checkInBtn').textContent = '今日已打卡';
                    document.getElementById('checkInBtn').disabled = true;
                }
                utils.showToast('打卡成功！', 'success');
                const [countResult, streakResult] = await Promise.all([api.getCheckInCount(), api.getCheckInStreak()]);
                if (countResult.success && countResult.data !== undefined) document.getElementById('checkInCount').textContent = countResult.data;
                if (streakResult.success && streakResult.data !== undefined) document.getElementById('checkInStreak').textContent = streakResult.data;
                renderCalendar();
            } else {
                utils.showToast(result.message || '打卡失败', 'error');
            }
        }
        
        loadCheckInData();
        
        // ==================== 健身数据 ====================
        let fitnessData = [];
        let editingId = null;
        let fitnessChart = null;
        let caloriesChart = null;
        let durationChart = null;
        document.getElementById('addDate').value = utils.formatDate(new Date());
        
        async function loadData() {
            const container = document.getElementById('recordsList');
            container.innerHTML = '<div class="empty-state"><div class="loading"></div><p>加载中...</p></div>';
            
            try {
                const result = await api.getFitnessData();
                if (result.success && result.data) {
                    fitnessData = result.data.sort((a, b) => new Date(a.date) - new Date(b.date));
                    updateStats();
                    updateCharts();
                    updateRecords();
                } else {
                    fitnessData = [];
                    updateStats();
                    updateCharts();
                    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏃</div><p>暂无记录，点击右下角按钮添加</p></div>';
                }
            } catch (error) {
                console.error('加载健身数据失败:', error);
                fitnessData = [];
                updateStats();
                updateCharts();
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>加载失败，请检查网络连接</p></div>';
            }
        }
        
        function updateStats() {
            if (fitnessData.length === 0) {
                document.getElementById('totalWorkouts').textContent = '0';
                document.getElementById('totalCalories').textContent = '0';
                document.getElementById('totalDuration').textContent = '0';
                document.getElementById('avgHeartRate').textContent = '--';
                return;
            }
            const totalCalories = fitnessData.reduce((s, d) => s + (d.calories || 0), 0);
            const totalDuration = fitnessData.reduce((s, d) => s + (d.duration || 0), 0);
            const heartRates = fitnessData.filter(d => d.heart_rate).map(d => d.heart_rate);
            
            document.getElementById('totalWorkouts').textContent = fitnessData.length;
            document.getElementById('totalCalories').textContent = Math.round(totalCalories);
            document.getElementById('totalDuration').textContent = Math.round(totalDuration);
            document.getElementById('avgHeartRate').textContent = heartRates.length > 0 ? Math.round(heartRates.reduce((a, b) => a + b) / heartRates.length) : '--';
        }
        
        // 按日期累计同一天的数据
        function aggregateByDate(data) {
            const map = new Map();
            data.forEach(d => {
                const date = d.date;
                if (!map.has(date)) {
                    map.set(date, { date, calories: 0, duration: 0 });
                }
                const entry = map.get(date);
                entry.calories += d.calories || 0;
                entry.duration += d.duration || 0;
            });
            return Array.from(map.values());
        }
        
        function updateCharts() {
            const range = 14;
            const chartData = fitnessData.slice(-range);
            // 按日期累计
            const aggregated = aggregateByDate(chartData);
            
            // 打卡区域旁的趋势图
            const canvas0 = document.getElementById('fitnessChart');
            if (fitnessChart) { fitnessChart.destroy(); fitnessChart = null; }
            if (aggregated.length > 0 && canvas0) {
                fitnessChart = new Chart(canvas0.getContext('2d'), {
                    type: 'bar',
                    data: {
                        labels: aggregated.map(d => d.date.substring(5)),
                        datasets: [{
                            label: '卡路里(kcal)',
                            data: aggregated.map(d => d.calories),
                            backgroundColor: 'rgba(33, 150, 243, 0.6)',
                            borderColor: '#2196F3',
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 0 } },
                            y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 10 } } }
                        }
                    }
                });
            }
            
            // 卡路里趋势图
            const canvas1 = document.getElementById('caloriesChart');
            if (caloriesChart) { caloriesChart.destroy(); caloriesChart = null; }
            if (aggregated.length > 0 && canvas1) {
                caloriesChart = new Chart(canvas1.getContext('2d'), {
                    type: 'bar',
                    data: {
                        labels: aggregated.map(d => d.date.substring(5)),
                        datasets: [{
                            label: '卡路里(kcal)',
                            data: aggregated.map(d => d.calories),
                            backgroundColor: 'rgba(33, 150, 243, 0.6)',
                            borderColor: '#2196F3',
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 0 } },
                            y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 10 } } }
                        }
                    }
                });
            }
            
            // 时长趋势图
            const canvas2 = document.getElementById('durationChart');
            if (durationChart) { durationChart.destroy(); durationChart = null; }
            if (aggregated.length > 0 && canvas2) {
                durationChart = new Chart(canvas2.getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: aggregated.map(d => d.date.substring(5)),
                        datasets: [{
                            label: '时长(分钟)',
                            data: aggregated.map(d => d.duration),
                            borderColor: '#2196F3',
                            backgroundColor: 'rgba(33, 150, 243, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 0 } },
                            y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 10 } } }
                        }
                    }
                });
            }
        }
        
        function updateRecords() {
            const container = document.getElementById('recordsList');
            if (fitnessData.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏃</div><p>暂无记录，点击右下角按钮添加</p></div>';
                return;
            }
            container.innerHTML = fitnessData.slice().reverse().map(record => `
                <div class="fitness-card" onclick="editRecord(${record.id})">
                    <div class="fitness-date">📅 ${record.date}<span class="fitness-type-tag">${record.type}</span></div>
                    <div class="fitness-meal">
                        <div class="meal-item">
                            <div class="meal-label">⏱️ 运动时长</div>
                            <div class="meal-content">${record.duration}分钟</div>
                        </div>
                        <div class="meal-item">
                            <div class="meal-label">🔥 热量燃烧</div>
                            <div class="meal-content">${record.calories || 0}kcal</div>
                        </div>
                        <div class="meal-item">
                            <div class="meal-label">❤️ 平均心率</div>
                            <div class="meal-content">${record.heart_rate || '--'}bpm</div>
                        </div>
                    </div>
                    <div class="fitness-actions">
                        <button class="fitness-action-btn" onclick="event.stopPropagation(); editRecord(${record.id})">✏️ 修改</button>
                        <button class="fitness-action-btn delete-btn" onclick="event.stopPropagation(); deleteRecord(${record.id})">🗑️ 删除</button>
                    </div>
                </div>
            `).join('');
        }
        
        function showAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = '添加运动记录';
            document.getElementById('addDate').value = utils.formatDate(new Date());
            document.getElementById('addType').value = '跑步';
            document.getElementById('addDuration').value = 30;
            document.getElementById('addCalories').value = 200;
            document.getElementById('addHeartRate').value = '';
            document.getElementById('addModal').classList.add('active');
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        
        async function editRecord(id) {
            const record = fitnessData.find(r => r.id === id);
            if (!record) return;
            
            editingId = id;
            document.getElementById('modalTitle').textContent = '编辑运动记录';
            document.getElementById('addDate').value = record.date;
            document.getElementById('addType').value = record.type;
            document.getElementById('addDuration').value = record.duration;
            document.getElementById('addCalories').value = record.calories || 0;
            document.getElementById('addHeartRate').value = record.heart_rate || '';
            document.getElementById('addModal').classList.add('active');
        }
        
        async function saveRecord() {
            const data = {
                date: document.getElementById('addDate').value,
                type: document.getElementById('addType').value,
                duration: parseFloat(document.getElementById('addDuration').value),
                calories: parseFloat(document.getElementById('addCalories').value),
                heart_rate: parseFloat(document.getElementById('addHeartRate').value) || 0
            };
            
            if (!data.date) {
                utils.showToast('请选择日期', 'error');
                return;
            }
            if (!data.duration || data.duration <= 0) {
                utils.showToast('请输入有效的运动时长', 'error');
                return;
            }
            
            let result;
            if (editingId) {
                result = await api.updateFitnessData(editingId, data);
            } else {
                result = await api.addFitnessData(data);
            }
            
            if (result.success) {
                utils.showToast(editingId ? '更新成功' : '添加成功', 'success');
                closeModal('addModal');
                loadData();
            } else {
                utils.showToast(result.message || '操作失败', 'error');
            }
        }
        
        async function deleteRecord(id) {
            if (!confirm('确定要删除这条记录吗？')) return;
            
            const result = await api.deleteFitnessData(id);
            if (result.success) {
                utils.showToast('删除成功', 'success');
                loadData();
            } else {
                utils.showToast(result.message || '删除失败', 'error');
            }
        }
        
        loadData();
    </script>
</body>
</html>
